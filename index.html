<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0B162C">
  <title>CARP PLAYERS</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./players-data.js"></script>

  <!-- Tailwind Custom Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* iOSのセーフエリア対応とスクロールバー非表示 */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .pt-safe-top { padding-top: env(safe-area-inset-top); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
  </style>
</head>
<body class="bg-[#0B162C] text-gray-900 font-sans antialiased pb-safe">

  <!-- Main View -->
  <div id="main-view">
    <!-- Header & Search -->
    <div class="sticky top-0 z-40 shadow-sm">
      <div class="relative overflow-hidden bg-[#C80815] pt-safe-top">
        <div class="absolute inset-y-0 left-0 w-16 bg-white/6 [clip-path:polygon(0_0,100%_0,72%_100%,0_100%)]"></div>
        <div class="absolute inset-y-0 right-0 w-16 bg-black/8 [clip-path:polygon(28%_0,100%_0,100%_100%,0_100%)]"></div>
        <div class="absolute inset-x-0 bottom-0 h-px bg-white/18"></div>
        <div class="relative flex items-center justify-center px-4 pb-5 pt-4">
          <img src="./carp-logo.svg" alt="CARP PLAYERS" class="h-10 w-auto max-w-[220px]">
        </div>
      </div>

      <div class="bg-[#0B162C] px-4 pb-4 pt-4">
        <div id="filter-container" class="rounded-[22px] bg-white/4 px-2.5 pt-2.5 pb-2">
          <!-- JSで生成 -->
        </div>
      </div>
    </div>

    <!-- Player List -->
    <div id="player-list" class="grid grid-cols-1 gap-4 p-4 pb-[calc(env(safe-area-inset-bottom)+112px)] md:grid-cols-2 lg:grid-cols-3">
      <!-- JSで生成 -->
    </div>

    <div id="search-dock" class="fixed bottom-[calc(env(safe-area-inset-bottom)+20px)] right-4 z-[65]">
      <div id="search-shell" class="flex h-14 w-14 items-center justify-end overflow-hidden rounded-full bg-[#C80815] shadow-[0_18px_38px_rgba(2,6,23,0.28)] backdrop-blur-md transition-all duration-200 ease-out">
        <div class="pointer-events-none flex h-14 w-14 shrink-0 items-center justify-center text-white">
          <svg viewBox="0 0 24 24" class="h-6 w-6 drop-shadow-[0_1px_2px_rgba(2,6,23,0.45)]" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="M16 16l4.5 4.5"></path>
          </svg>
        </div>
        <input
          id="search-input"
          type="text"
          placeholder="選手名、背番号、出身校"
          class="w-0 min-w-0 flex-1 bg-transparent px-0 pr-1 text-[15px] font-medium text-white placeholder:text-white/52 outline-none opacity-0 transition-all duration-150"
        />
        <button id="search-toggle" onclick="toggleSearch()" aria-label="検索" class="flex h-14 w-14 shrink-0 items-center justify-center text-white transition active:scale-95">
          <svg id="search-toggle-icon" viewBox="0 0 24 24" class="h-6 w-6 drop-shadow-[0_1px_2px_rgba(2,6,23,0.45)]" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="M16 16l4.5 4.5"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 z-50 bg-[#0B162C] overflow-y-auto">
    <!-- JSで生成 -->
  </div>

  <script>
    // --- 1. データ定義 (JSON) ---
    function formatAverage(value) {
      if (value === null || value === undefined || value === '-') return '-';
      const numeric = Number(value);
      if (Number.isNaN(numeric)) return String(value);
      return numeric.toFixed(3).replace(/^0/, '');
    }

    function formatNumber(value, digits = 0) {
      if (value === null || value === undefined || value === '') return '-';
      const numeric = Number(value);
      if (Number.isNaN(numeric)) return String(value);
      return digits > 0 ? numeric.toFixed(digits) : String(numeric);
    }

    function hasAnyStat(stats = {}) {
      return Object.values(stats).some(value => value !== null && value !== undefined && value !== '');
    }

    function formatDraftLabel(draft) {
      if (!draft || draft === '-') return null;
      return String(draft).replace(/ドラフト/g, '').replace(/\s+/g, ' ').trim();
    }

    function buildPlayerChips(player) {
      const chips = [player.pos];
      if (player.status === '育成') chips.push('育成');

      const throwBat = String(player.throw_bat || '');
      const match = throwBat.match(/(右投|左投)(右打|左打|両打)/);
      if (match) {
        chips.push(match[1], match[2]);
      } else if (throwBat && throwBat !== '-') {
        chips.push(throwBat);
      }

      return chips;
    }

    function parseThrowBat(throwBat) {
      const normalized = String(throwBat || '');
      const match = normalized.match(/(右投|左投)?(右打|左打|両打)?/);
      return {
        throwHand: match?.[1] || null,
        batHand: match?.[2] || null
      };
    }

    function calculateAge(birth) {
      if (!birth || birth === '-') return null;
      const normalized = String(birth).replace(/年|月/g, '-').replace(/日/g, '');
      const date = new Date(normalized);
      if (Number.isNaN(date.getTime())) return null;

      const today = new Date();
      let age = today.getFullYear() - date.getFullYear();
      const hasHadBirthday =
        today.getMonth() > date.getMonth() ||
        (today.getMonth() === date.getMonth() && today.getDate() >= date.getDate());

      if (!hasHadBirthday) age -= 1;
      return age;
    }

    function normalizePlayer(player) {
      const batting = player.stats2025?.batting ?? {};
      const pitching = player.stats2025?.pitching ?? {};
      const displayStatus = player.registration || player.status;
      const { throwHand, batHand } = parseThrowBat(player.throw_bat);
      const displayRole = !displayStatus || displayStatus === player.pos || displayStatus.includes(player.pos)
        ? displayStatus || player.pos
        : `${displayStatus} • ${player.pos}`;

      return {
        ...player,
        school: player.school || '-',
        height: player.height ?? '-',
        weight: player.weight ?? '-',
        birth: player.birth || '-',
        birthplace: player.birthplace || '-',
        throw_bat: player.throw_bat || '-',
        history: player.history || '-',
        draft: player.draft || '-',
        draftLabel: formatDraftLabel(player.draft),
        debut: player.debut || '-',
        age: calculateAge(player.birth),
        chips: buildPlayerChips(player),
        throwHand,
        batHand,
        displayStatus,
        displayRole,
        avg: formatAverage(player.avg),
        era: formatNumber(player.era, 2),
        stats2025: {
          batting,
          pitching,
          fieldingSummary: player.stats2025?.fieldingSummary || null
        },
        hasBattingStats: hasAnyStat(batting),
        hasPitchingStats: hasAnyStat(pitching)
      };
    }

    const playersData = (window.playersData || []).map(normalizePlayer);

    // --- 2. 状態管理 ---
    let state = {
      searchQuery: '',
      searchOpen: false,
      rosterFilter: '支配下',
      activePositionFilter: null,
      activeThrowFilter: null,
      activeBatFilter: null,
      sortKey: 'no',
      sortDirection: 'desc',
      selectedPlayer: null
    };

    const positionFilters = ['投手', '野手', '捕手', '内野手', '外野手'];
    const sortOptions = [
      { key: 'no', label: '背番号' },
      { key: 'age', label: '年齢' }
    ];

    // --- 3. DOM要素 ---
    const searchInput = document.getElementById('search-input');
    const searchDock = document.getElementById('search-dock');
    const searchShell = document.getElementById('search-shell');
    const searchToggleIcon = document.getElementById('search-toggle-icon');
    const filterContainer = document.getElementById('filter-container');
    const playerListContainer = document.getElementById('player-list');
    const mainView = document.getElementById('main-view');
    const detailModal = document.getElementById('detail-modal');

    function renderSearchDock() {
      if (state.selectedPlayer) {
        searchDock.classList.add('hidden');
        return;
      }

      searchDock.classList.remove('hidden');
      const isOpen = state.searchOpen;
      searchShell.classList.toggle('w-14', !isOpen);
      searchShell.classList.toggle('w-[min(calc(100vw-32px),360px)]', isOpen);
      searchInput.classList.toggle('w-0', !isOpen);
      searchInput.classList.toggle('opacity-0', !isOpen);
      searchInput.classList.toggle('px-0', !isOpen);
      searchInput.classList.toggle('w-full', isOpen);
      searchInput.classList.toggle('opacity-100', isOpen);
      searchInput.classList.toggle('pl-0', isOpen);
      searchToggleIcon.innerHTML = isOpen
        ? '<path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>'
        : '<circle cx="11" cy="11" r="6.5"></circle><path d="M16 16l4.5 4.5"></path>';
    }

    // --- 4. レンダリング関数 ---
    function renderFilters() {
      const rosterButton = `
        <button
          onclick="toggleRosterFilter()"
          class="min-w-0 rounded-xl bg-transparent px-0 py-2 text-[11px] font-semibold tracking-tight text-white transition-colors hover:bg-white/6"
        >
          ${state.rosterFilter}
        </button>
      `;

      const positionButtons = positionFilters.map(filter => `
        <button
          onclick="setPositionFilter('${filter}')"
          class="min-w-0 rounded-xl px-0 py-2 text-[11px] font-semibold tracking-tight transition-colors ${
            state.activePositionFilter === filter
              ? 'bg-[#C80815] text-white shadow-[0_8px_18px_rgba(108,6,16,0.24)]'
              : 'bg-white/6 text-white hover:bg-white/10'
          }"
        >
          ${filter}
        </button>
      `).join('');

      const throwButton = `
        <button
          onclick="cycleThrowFilter()"
          class="min-w-0 rounded-xl px-0 py-2 text-[11px] font-semibold tracking-tight transition-colors ${
            state.activeThrowFilter
              ? 'bg-transparent text-white'
              : 'bg-white/6 text-white hover:bg-white/10'
          }"
        >
          ${state.activeThrowFilter || '右投・左投'}
        </button>
      `;

      const batButton = `
        <button
          onclick="cycleBatFilter()"
          class="min-w-0 rounded-xl px-0 py-2 text-[11px] font-semibold tracking-tight transition-colors ${
            state.activeBatFilter
              ? 'bg-transparent text-white'
              : 'bg-white/6 text-white hover:bg-white/10'
          }"
        >
          ${state.activeBatFilter || '右打・左打'}
        </button>
      `;

      const sortButtons = sortOptions.map(option => {
        const arrow = state.sortKey === option.key ? (state.sortDirection === 'desc' ? '↓' : '↑') : '';
        return `
          <button
            onclick="setSort('${option.key}')"
            class="min-w-0 rounded-xl px-0 py-2 text-[11px] font-semibold tracking-tight transition-colors ${
              state.sortKey === option.key
                ? 'bg-white/10 text-white'
                : 'bg-white/6 text-white hover:bg-white/10'
            }"
          >
            ${option.label}${arrow}
          </button>
        `;
      }).join('');

      filterContainer.innerHTML = `
        <div class="grid grid-cols-5 gap-1.5">
          ${positionButtons}
        </div>
        <div class="mt-2.5 grid grid-cols-5 gap-1.5">
          ${rosterButton}${throwButton}${batButton}${sortButtons}
        </div>
      `;
    }

    function comparePlayers(a, b) {
      let result = 0;

      if (state.sortKey === 'age') {
        const aValue = a.age ?? Number.POSITIVE_INFINITY;
        const bValue = b.age ?? Number.POSITIVE_INFINITY;
        if (aValue !== bValue) result = aValue - bValue;
      } else {
        result = Number(a.no) - Number(b.no);
      }

      if (result === 0) {
        result = a.name.localeCompare(b.name, 'ja');
      }

      return state.sortDirection === 'asc' ? result : result * -1;
    }

    function renderPlayerList() {
      const q = state.searchQuery.toLowerCase();
      
      const filtered = playersData.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(q) || 
                              (p.nameKana || '').toLowerCase().includes(q) ||
                              p.no.includes(q) ||
                              p.school.toLowerCase().includes(q);
                              
        let matchesPositionFilter = true;
        if (state.activePositionFilter) {
          matchesPositionFilter = state.activePositionFilter === '野手'
            ? p.pos !== '投手'
            : p.pos === state.activePositionFilter;
        }

        const matchesRosterFilter = state.rosterFilter === '育成' ? p.status === '育成' : p.status !== '育成';

        let matchesThrowFilter = true;
        if (state.activeThrowFilter) {
          matchesThrowFilter = p.throwHand === state.activeThrowFilter;
        }

        let matchesBatFilter = true;
        if (state.activeBatFilter) {
          matchesBatFilter = p.batHand === state.activeBatFilter || p.batHand === '両打';
        }

        return matchesSearch && matchesPositionFilter && matchesRosterFilter && matchesThrowFilter && matchesBatFilter;
      }).sort(comparePlayers);

      if (filtered.length === 0) {
        playerListContainer.innerHTML = `<div class="col-span-full py-12 text-center text-gray-400">該当する選手が見つかりません</div>`;
        return;
      }

      playerListContainer.innerHTML = filtered.map(p => `
        <div 
          onclick="openDetail('${p.no}')"
          class="relative overflow-hidden bg-white rounded-2xl p-5 shadow-sm active:scale-95 transition-transform cursor-pointer border border-gray-100"
        >
          <div class="absolute -right-4 -bottom-6 text-9xl font-black italic opacity-[0.03] pointer-events-none text-[#0B162C]">
            ${p.no}
          </div>
          <div class="flex justify-between items-start relative z-10">
            <div class="flex-1 min-w-0 pr-4">
              <div class="mb-2 flex flex-wrap gap-1.5">
                ${p.chips.map(chip => `
                  <span class="rounded-full px-2.5 py-1 text-[11px] font-bold leading-none ${
                    chip === p.pos
                      ? 'bg-red-50 text-[#C80815]'
                      : chip === '育成'
                        ? 'bg-gray-200 text-gray-600'
                        : 'bg-[#0B162C]/6 text-[#0B162C]/72'
                  }">
                    ${chip}
                  </span>
                `).join('')}
              </div>
              <div class="mt-1 flex items-end gap-2 min-w-0">
                <h2 class="truncate text-xl font-bold tracking-tight text-gray-900">${p.name}</h2>
                ${p.nameKana ? `<span class="shrink-0 text-[11px] font-medium tracking-wide text-gray-400">${p.nameKana}</span>` : ''}
              </div>
              <p class="mt-1 text-sm text-gray-500 truncate">
                ${[p.birthplace, p.age !== null ? `${p.age}歳` : null, p.draftLabel].filter(Boolean).join(' • ')}
              </p>
            </div>
            <div class="text-3xl font-black text-[#C80815] shrink-0">${p.no}</div>
          </div>
        </div>
      `).join('');
    }

    function renderDetailModal() {
      const p = state.selectedPlayer;
      if (!p) return;

      const hasStats = p.era !== '-' || p.avg !== '-';
      const batting = p.stats2025?.batting ?? {};
      const pitching = p.stats2025?.pitching ?? {};
      const statBlocks = [];

      if (p.pos === '投手' && p.hasPitchingStats) {
        statBlocks.push(
          createStatsGrid('2025 PITCHING', [
            ['登板', formatNumber(pitching.appearances)],
            ['勝敗', `${formatNumber(pitching.wins)}-${formatNumber(pitching.losses)}`],
            ['セーブ', formatNumber(pitching.saves)],
            ['HLD/HP', `${formatNumber(pitching.holds)}/${formatNumber(pitching.holdPoints)}`],
            ['投球回', formatNumber(pitching.inningsPitched, 1)],
            ['奪三振', formatNumber(pitching.strikeouts)]
          ])
        );
      }

      if (p.pos !== '投手' && p.hasBattingStats) {
        statBlocks.push(
          createStatsGrid('2025 BATTING', [
            ['試合', formatNumber(batting.games)],
            ['打席', formatNumber(batting.plateAppearances)],
            ['打数', formatNumber(batting.atBats)],
            ['安打', formatNumber(batting.hits)],
            ['本塁打', formatNumber(batting.homeRuns)],
            ['打点', formatNumber(batting.runsBattedIn)],
            ['出塁率', formatAverage(batting.onBasePercentage)],
            ['長打率', formatAverage(batting.sluggingPercentage)]
          ])
        );
      }

      if (p.stats2025?.fieldingSummary) {
        statBlocks.push(`
          <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
            <h3 class="text-sm font-bold text-gray-400 mb-3 tracking-wider">2025 FIELDING</h3>
            <div class="text-sm font-medium text-gray-900">${p.stats2025.fieldingSummary}</div>
          </div>
        `);
      }

      const statsHtml = hasStats ? `
        <div class="rounded-[28px] border border-gray-100 bg-white p-6 shadow-[0_10px_30px_rgba(15,23,42,0.06)]">
          <h3 class="mb-4 text-sm font-bold tracking-wider text-gray-400">2025 SUMMARY</h3>
          <div class="grid grid-cols-2 gap-3">
            <div class="rounded-2xl bg-gray-50 px-4 py-4 text-center">
              <div class="mb-1 text-[11px] font-bold tracking-[0.18em] text-[#C80815]/72">2025 ${p.pos === '投手' ? '防御率' : '打率'}</div>
              <div class="text-3xl font-black tracking-tight text-gray-900">${p.pos === '投手' ? p.era : p.avg}</div>
            </div>
            <div class="rounded-2xl bg-gray-50 px-4 py-4 text-center">
              <div class="mb-1 text-[11px] font-bold tracking-[0.18em] text-[#C80815]/72">試合</div>
              <div class="text-3xl font-black tracking-tight text-gray-900">${formatNumber(p.pos === '投手' ? pitching.appearances : batting.games)}</div>
            </div>
          </div>
        </div>
      ` : '';

      detailModal.innerHTML = `
        <div class="sticky top-0 z-30 shadow-sm">
          <div class="relative overflow-hidden bg-[#C80815] pt-safe-top">
            <div class="absolute inset-y-0 left-0 w-16 bg-white/6 [clip-path:polygon(0_0,100%_0,72%_100%,0_100%)]"></div>
            <div class="absolute inset-y-0 right-0 w-16 bg-black/8 [clip-path:polygon(28%_0,100%_0,100%_100%,0_100%)]"></div>
            <div class="absolute inset-x-0 bottom-0 h-px bg-white/18"></div>
            <div class="relative flex items-center justify-center px-5 pb-5 pt-4">
              <img src="./carp-logo.svg" alt="" class="h-10 w-auto max-w-[220px]">
            </div>
          </div>

          <div class="bg-[#0B162C] px-5 pb-5 pt-4 text-white">
            <div class="flex items-end justify-between gap-5">
              <div class="min-w-0 flex-1 max-w-[70%]">
                <div class="mb-2 flex flex-wrap items-center gap-x-3 gap-y-1 text-[12px] font-semibold text-white/80">
                  <div class="tracking-[0.22em]">${p.displayRole}</div>
                  <div class="tracking-[0.08em]">${p.throw_bat}</div>
                </div>
                <h1 class="text-[2.5rem] font-black tracking-[-0.04em] leading-[0.96] text-white">${p.name}</h1>
                ${p.nameKana ? `<div class="mt-2 text-[12px] font-semibold tracking-[0.2em] text-white/76">${p.nameKana}</div>` : ''}
              </div>
              <div class="shrink-0 pr-1 text-[5rem] font-black italic leading-[0.82] tracking-[-0.06em] text-white">${p.no}</div>
            </div>
          </div>
        </div>

        <button onclick="closeDetail()" aria-label="閉じる" class="fixed bottom-[calc(env(safe-area-inset-bottom)+20px)] right-4 z-[65] flex h-14 w-14 items-center justify-center rounded-full bg-[#C80815] text-[2rem] leading-none text-white shadow-[0_18px_38px_rgba(2,6,23,0.28)] [text-shadow:0_1px_2px_rgba(2,6,23,0.45)] backdrop-blur-md transition active:scale-95">✕</button>

        <div class="pt-2">
          <div class="relative z-20 mx-auto max-w-2xl px-4">
            ${statsHtml}
          </div>

          <div class="mx-auto max-w-2xl space-y-4 px-4 pb-[calc(env(safe-area-inset-bottom)+112px)] pt-6">
            <div class="rounded-[28px] border border-gray-100 bg-white p-6 shadow-[0_10px_30px_rgba(15,23,42,0.06)]">
              <h3 class="text-sm font-bold text-gray-400 mb-4 tracking-wider">PROFILE</h3>
              <div class="space-y-4">
                ${createDetailRow('生年月日', p.birth)}
                ${createDetailRow('出身地', p.birthplace)}
                <div class="flex gap-4">
                  <div class="flex-1">${createDetailRow('身長', p.height + ' cm')}</div>
                  <div class="flex-1">${createDetailRow('体重', p.weight + ' kg')}</div>
                </div>
              </div>
            </div>

            <div class="rounded-[28px] border border-gray-100 bg-white p-6 pb-8 shadow-[0_10px_30px_rgba(15,23,42,0.06)]">
              <h3 class="text-sm font-bold text-gray-400 mb-4 tracking-wider">CAREER</h3>
              <div class="space-y-4">
                ${createDetailRow('出身校・経歴', p.history)}
                ${createDetailRow('出身校', p.school)}
                ${createDetailRow('ドラフト', p.draft)}
                ${createDetailRow('初出場', p.debut)}
              </div>
            </div>

            ${statBlocks.join('')}
          </div>
        </div>
      `;
    }

    function createDetailRow(label, value) {
      return `
        <div class="border-b border-gray-100 pb-3 last:border-b-0 last:pb-0">
          <div class="text-[11px] font-bold tracking-[0.16em] text-gray-400">${label}</div>
          <div class="mt-1 text-sm font-medium leading-6 text-gray-900">${value}</div>
        </div>
      `;
    }

    function createStatsGrid(title, items) {
      return `
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
          <h3 class="text-sm font-bold text-gray-400 mb-4 tracking-wider">${title}</h3>
          <div class="grid grid-cols-2 gap-3">
            ${items.map(([label, value]) => `
              <div class="rounded-xl bg-gray-50 px-3 py-3">
                <div class="text-xs text-gray-500">${label}</div>
                <div class="mt-1 text-lg font-bold text-gray-900">${value}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    // --- 5. アクション関数 ---
    window.setPositionFilter = (filter) => {
      state.activePositionFilter = state.activePositionFilter === filter ? null : filter;
      renderFilters();
      renderPlayerList();
    };

    window.toggleRosterFilter = () => {
      state.rosterFilter = state.rosterFilter === '支配下' ? '育成' : '支配下';
      renderFilters();
      renderPlayerList();
    };

    window.cycleThrowFilter = () => {
      state.activeThrowFilter =
        state.activeThrowFilter === null ? '右投' :
        state.activeThrowFilter === '右投' ? '左投' :
        null;
      renderFilters();
      renderPlayerList();
    };

    window.cycleBatFilter = () => {
      state.activeBatFilter =
        state.activeBatFilter === null ? '右打' :
        state.activeBatFilter === '右打' ? '左打' :
        null;
      renderFilters();
      renderPlayerList();
    };

    window.setSort = (sortKey) => {
      if (state.sortKey === sortKey) {
        state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortKey = sortKey;
        state.sortDirection = 'asc';
      }
      renderFilters();
      renderPlayerList();
    };

    window.toggleSearch = () => {
      if (state.searchOpen) {
        state.searchOpen = false;
        state.searchQuery = '';
        searchInput.value = '';
        renderSearchDock();
        renderPlayerList();
        searchInput.blur();
        return;
      }

      state.searchOpen = true;
      renderSearchDock();
      setTimeout(() => searchInput.focus(), 0);
    };

    window.openDetail = (no) => {
      const player = playersData.find(p => p.no === no);
      if (player) {
        state.selectedPlayer = player;
        renderDetailModal();
        detailModal.classList.remove('hidden');
        renderSearchDock();
        document.body.style.overflow = 'hidden'; // 背面スクロール防止
      }
    };

    window.closeDetail = () => {
      state.selectedPlayer = null;
      detailModal.classList.add('hidden');
      document.body.style.overflow = '';
      detailModal.innerHTML = ''; // メモリ解放
      renderSearchDock();
    };

    // --- 6. イベントリスナー ---
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      renderPlayerList();
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.toggleSearch();
      }
    });

    // --- 7. 初期化 ---
    renderSearchDock();
    renderFilters();
    renderPlayerList();

  </script>
</body>
</html>
