<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#C80815">
  <title>CARP PLAYERS</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./players-data.js"></script>

  <!-- Tailwind Custom Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* iOSのセーフエリア対応とスクロールバー非表示 */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .pt-safe-top { padding-top: env(safe-area-inset-top); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* モーダルのアニメーション */
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased pb-safe">

  <!-- Main View -->
  <div id="main-view">
    <!-- Header & Search -->
    <div class="sticky top-0 z-40 bg-[#C80815] shadow-sm pt-safe-top">
      <div class="space-y-3 px-4 py-4">
        <div class="flex justify-center">
          <img src="./carp-logo.svg" alt="CARP PLAYERS" class="h-10 w-auto max-w-[220px]">
        </div>
        <div class="relative">
          <input
            id="search-input"
            type="text"
            placeholder="選手名、背番号、出身校で検索..."
            class="w-full rounded-2xl border border-white/70 bg-white/96 px-4 py-3 text-gray-900 placeholder:text-gray-400 outline-none transition-all focus:border-white focus:bg-white shadow-[0_10px_24px_rgba(125,9,19,0.18)]"
          />
          <button id="clear-search" class="absolute inset-y-0 right-3 hidden text-xs font-semibold text-gray-400">
            消去
          </button>
        </div>
      </div>

      <!-- Filters / Sort -->
      <div id="filter-container" class="mx-4 mb-5 rounded-[22px] bg-white/16 p-2.5 shadow-[0_12px_30px_rgba(123,8,19,0.18)] backdrop-blur-[6px]">
        <!-- JSで生成 -->
      </div>
    </div>

    <!-- Player List -->
    <div id="player-list" class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- JSで生成 -->
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 z-50 bg-gray-50 overflow-y-auto slide-up">
    <!-- JSで生成 -->
  </div>

  <script>
    // --- 1. データ定義 (JSON) ---
    function formatAverage(value) {
      if (value === null || value === undefined || value === '-') return '-';
      const numeric = Number(value);
      if (Number.isNaN(numeric)) return String(value);
      return numeric.toFixed(3).replace(/^0/, '');
    }

    function formatNumber(value, digits = 0) {
      if (value === null || value === undefined || value === '') return '-';
      const numeric = Number(value);
      if (Number.isNaN(numeric)) return String(value);
      return digits > 0 ? numeric.toFixed(digits) : String(numeric);
    }

    function hasAnyStat(stats = {}) {
      return Object.values(stats).some(value => value !== null && value !== undefined && value !== '');
    }

    function formatDraftLabel(draft) {
      if (!draft || draft === '-') return null;
      return String(draft).replace(/ドラフト/g, '').replace(/\s+/g, ' ').trim();
    }

    function buildPlayerChips(player) {
      const chips = [player.pos];
      if (player.status === '育成') chips.push('育成');

      const throwBat = String(player.throw_bat || '');
      const match = throwBat.match(/(右投|左投)(右打|左打|両打)/);
      if (match) {
        chips.push(match[1], match[2]);
      } else if (throwBat && throwBat !== '-') {
        chips.push(throwBat);
      }

      return chips;
    }

    function parseThrowBat(throwBat) {
      const normalized = String(throwBat || '');
      const match = normalized.match(/(右投|左投)?(右打|左打|両打)?/);
      return {
        throwHand: match?.[1] || null,
        batHand: match?.[2] || null
      };
    }

    function calculateAge(birth) {
      if (!birth || birth === '-') return null;
      const normalized = String(birth).replace(/年|月/g, '-').replace(/日/g, '');
      const date = new Date(normalized);
      if (Number.isNaN(date.getTime())) return null;

      const today = new Date();
      let age = today.getFullYear() - date.getFullYear();
      const hasHadBirthday =
        today.getMonth() > date.getMonth() ||
        (today.getMonth() === date.getMonth() && today.getDate() >= date.getDate());

      if (!hasHadBirthday) age -= 1;
      return age;
    }

    function normalizePlayer(player) {
      const batting = player.stats2025?.batting ?? {};
      const pitching = player.stats2025?.pitching ?? {};
      const displayStatus = player.registration || player.status;
      const { throwHand, batHand } = parseThrowBat(player.throw_bat);
      const displayRole = !displayStatus || displayStatus === player.pos || displayStatus.includes(player.pos)
        ? displayStatus || player.pos
        : `${displayStatus} • ${player.pos}`;

      return {
        ...player,
        school: player.school || '-',
        height: player.height ?? '-',
        weight: player.weight ?? '-',
        birth: player.birth || '-',
        birthplace: player.birthplace || '-',
        throw_bat: player.throw_bat || '-',
        history: player.history || '-',
        draft: player.draft || '-',
        draftLabel: formatDraftLabel(player.draft),
        debut: player.debut || '-',
        age: calculateAge(player.birth),
        chips: buildPlayerChips(player),
        throwHand,
        batHand,
        displayStatus,
        displayRole,
        avg: formatAverage(player.avg),
        era: formatNumber(player.era, 2),
        stats2025: {
          batting,
          pitching,
          fieldingSummary: player.stats2025?.fieldingSummary || null
        },
        hasBattingStats: hasAnyStat(batting),
        hasPitchingStats: hasAnyStat(pitching)
      };
    }

    const playersData = (window.playersData || []).map(normalizePlayer);

    // --- 2. 状態管理 ---
    let state = {
      searchQuery: '',
      activePositionFilter: null,
      activeDevelopmentFilter: null,
      activeHandedFilter: null,
      sortKey: 'no',
      sortDirection: 'desc',
      selectedPlayer: null
    };

    const positionFilters = ['投手', '捕手', '内野手', '外野手'];
    const handednessFilters = ['右投', '左投', '右打', '左打'];
    const sortOptions = [
      { key: 'no', label: '背番号' },
      { key: 'age', label: '年齢' }
    ];

    // --- 3. DOM要素 ---
    const searchInput = document.getElementById('search-input');
    const clearSearchBtn = document.getElementById('clear-search');
    const filterContainer = document.getElementById('filter-container');
    const playerListContainer = document.getElementById('player-list');
    const mainView = document.getElementById('main-view');
    const detailModal = document.getElementById('detail-modal');

    // --- 4. レンダリング関数 ---
    function renderFilters() {
      const positionButtons = positionFilters.map(filter => `
        <button
          onclick="setPositionFilter('${filter}')"
          class="min-w-0 rounded-xl border px-0 py-2 text-[11px] font-semibold tracking-tight transition-colors ${
            state.activePositionFilter === filter
              ? 'border-white bg-white text-[#C80815] shadow-[0_6px_18px_rgba(108,6,16,0.18)]'
              : 'border-white/22 bg-[#D63441] text-white hover:bg-[#DC4450]'
          }"
        >
          ${filter}
        </button>
      `).join('');

      const developmentButton = `
        <button
          onclick="toggleDevelopmentFilter()"
          class="min-w-0 rounded-xl border px-0 py-2 text-[11px] font-semibold tracking-tight transition-colors ${
            state.activeDevelopmentFilter
              ? 'border-white bg-white text-[#C80815] shadow-[0_6px_18px_rgba(108,6,16,0.18)]'
              : 'border-white/22 bg-[#D63441] text-white hover:bg-[#DC4450]'
          }"
        >
          育成
        </button>
      `;

      const handednessButtons = handednessFilters.map(filter => `
        <button
          onclick="setHandednessFilter('${filter}')"
          class="min-w-0 rounded-xl border px-0 py-2 text-[11px] font-semibold tracking-tight transition-colors ${
            state.activeHandedFilter === filter
              ? 'border-white bg-white text-[#C80815] shadow-[0_6px_18px_rgba(108,6,16,0.18)]'
              : 'border-white/22 bg-[#D63441] text-white hover:bg-[#DC4450]'
          }"
        >
          ${filter}
        </button>
      `).join('');

      const sortButtons = sortOptions.map(option => {
        const arrow = state.sortKey === option.key ? (state.sortDirection === 'desc' ? '↓' : '↑') : '';
        return `
          <button
            onclick="setSort('${option.key}')"
            class="min-w-0 rounded-xl border px-0 py-2 text-[11px] font-semibold tracking-tight transition-colors ${
              state.sortKey === option.key
                ? 'border-white bg-white text-[#C80815] shadow-[0_6px_18px_rgba(108,6,16,0.18)]'
                : 'border-white/22 bg-[#D63441] text-white hover:bg-[#DC4450]'
            }"
          >
            ${option.label}${arrow}
          </button>
        `;
      }).join('');

      filterContainer.innerHTML = `
        <div class="grid grid-cols-5 gap-1.5">
          ${positionButtons}${developmentButton}
        </div>
        <div class="mt-1.5 grid grid-cols-6 gap-1.5">
          ${handednessButtons}${sortButtons}
        </div>
      `;
    }

    function comparePlayers(a, b) {
      let result = 0;

      if (state.sortKey === 'age') {
        const aValue = a.age ?? Number.POSITIVE_INFINITY;
        const bValue = b.age ?? Number.POSITIVE_INFINITY;
        if (aValue !== bValue) result = aValue - bValue;
      } else {
        result = Number(a.no) - Number(b.no);
      }

      if (result === 0) {
        result = a.name.localeCompare(b.name, 'ja');
      }

      return state.sortDirection === 'asc' ? result : result * -1;
    }

    function renderPlayerList() {
      const q = state.searchQuery.toLowerCase();
      
      const filtered = playersData.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(q) || 
                              (p.nameKana || '').toLowerCase().includes(q) ||
                              p.no.includes(q) ||
                              p.school.toLowerCase().includes(q);
                              
        let matchesPositionFilter = true;
        if (state.activePositionFilter) {
          matchesPositionFilter = p.pos === state.activePositionFilter;
        }

        const matchesDevelopmentFilter = state.activeDevelopmentFilter ? p.status === '育成' : p.status !== '育成';

        let matchesHandednessFilter = true;
        if (state.activeHandedFilter === '右投' || state.activeHandedFilter === '左投') {
          if (!state.activePositionFilter) {
            matchesHandednessFilter = p.pos === '投手' && p.throwHand === state.activeHandedFilter;
          } else {
            matchesHandednessFilter = p.throwHand === state.activeHandedFilter;
          }
        } else if (state.activeHandedFilter === '右打' || state.activeHandedFilter === '左打') {
          if (!state.activePositionFilter) {
            matchesHandednessFilter = p.pos !== '投手' && (p.batHand === state.activeHandedFilter || p.batHand === '両打');
          } else {
            matchesHandednessFilter = p.batHand === state.activeHandedFilter || p.batHand === '両打';
          }
        }

        return matchesSearch && matchesPositionFilter && matchesDevelopmentFilter && matchesHandednessFilter;
      }).sort(comparePlayers);

      if (filtered.length === 0) {
        playerListContainer.innerHTML = `<div class="col-span-full py-12 text-center text-gray-400">該当する選手が見つかりません</div>`;
        return;
      }

      playerListContainer.innerHTML = filtered.map(p => `
        <div 
          onclick="openDetail('${p.no}')"
          class="relative overflow-hidden bg-white rounded-2xl p-5 shadow-sm active:scale-95 transition-transform cursor-pointer border border-gray-100"
        >
          <div class="absolute -right-4 -bottom-6 text-9xl font-black italic opacity-[0.03] pointer-events-none text-[#0B162C]">
            ${p.no}
          </div>
          <div class="flex justify-between items-start relative z-10">
            <div class="flex-1 min-w-0 pr-4">
              <div class="mb-2 flex flex-wrap gap-1.5">
                ${p.chips.map(chip => `
                  <span class="rounded-full px-2.5 py-1 text-[11px] font-bold leading-none ${
                    chip === p.pos
                      ? 'bg-red-50 text-[#C80815]'
                      : chip === '育成'
                        ? 'bg-gray-200 text-gray-600'
                        : 'bg-[#0B162C]/6 text-[#0B162C]/72'
                  }">
                    ${chip}
                  </span>
                `).join('')}
              </div>
              <div class="mt-1 flex items-end gap-2 min-w-0">
                <h2 class="truncate text-xl font-bold tracking-tight text-gray-900">${p.name}</h2>
                ${p.nameKana ? `<span class="shrink-0 text-[11px] font-medium tracking-wide text-gray-400">${p.nameKana}</span>` : ''}
              </div>
              <p class="mt-1 text-sm text-gray-500 truncate">
                ${[p.birthplace, p.age !== null ? `${p.age}歳` : null, p.draftLabel].filter(Boolean).join(' • ')}
              </p>
            </div>
            <div class="text-3xl font-black text-[#C80815] shrink-0">${p.no}</div>
          </div>
        </div>
      `).join('');
    }

    function renderDetailModal() {
      const p = state.selectedPlayer;
      if (!p) return;

      const hasStats = p.era !== '-' || p.avg !== '-';
      const batting = p.stats2025?.batting ?? {};
      const pitching = p.stats2025?.pitching ?? {};
      const statBlocks = [];

      if (p.pos === '投手' && p.hasPitchingStats) {
        statBlocks.push(
          createStatsGrid('2025 PITCHING', [
            ['登板', formatNumber(pitching.appearances)],
            ['勝敗', `${formatNumber(pitching.wins)}-${formatNumber(pitching.losses)}`],
            ['セーブ', formatNumber(pitching.saves)],
            ['HLD/HP', `${formatNumber(pitching.holds)}/${formatNumber(pitching.holdPoints)}`],
            ['投球回', formatNumber(pitching.inningsPitched, 1)],
            ['奪三振', formatNumber(pitching.strikeouts)]
          ])
        );
      }

      if (p.pos !== '投手' && p.hasBattingStats) {
        statBlocks.push(
          createStatsGrid('2025 BATTING', [
            ['試合', formatNumber(batting.games)],
            ['打席', formatNumber(batting.plateAppearances)],
            ['打数', formatNumber(batting.atBats)],
            ['安打', formatNumber(batting.hits)],
            ['本塁打', formatNumber(batting.homeRuns)],
            ['打点', formatNumber(batting.runsBattedIn)],
            ['出塁率', formatAverage(batting.onBasePercentage)],
            ['長打率', formatAverage(batting.sluggingPercentage)]
          ])
        );
      }

      if (p.stats2025?.fieldingSummary) {
        statBlocks.push(`
          <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
            <h3 class="text-sm font-bold text-gray-400 mb-3 tracking-wider">2025 FIELDING</h3>
            <div class="text-sm font-medium text-gray-900">${p.stats2025.fieldingSummary}</div>
          </div>
        `);
      }

      const statsHtml = hasStats ? `
        <div class="mx-4 rounded-[28px] border border-white/80 bg-white/96 px-5 py-4 shadow-[0_18px_42px_rgba(112,10,22,0.18)] backdrop-blur-sm">
          <div class="grid grid-cols-[1fr_auto_1fr] items-center gap-4">
            <div class="text-center">
              <div class="mb-1 text-[11px] font-bold tracking-[0.18em] text-[#C80815]/72">2025 ${p.pos === '投手' ? '防御率' : '打率'}</div>
              <div class="text-3xl font-black tracking-tight text-gray-900">${p.pos === '投手' ? p.era : p.avg}</div>
            </div>
            <div class="h-12 w-px bg-gradient-to-b from-transparent via-[#C80815]/20 to-transparent"></div>
            <div class="text-center">
              <div class="mb-1 text-[11px] font-bold tracking-[0.18em] text-[#C80815]/72">試合</div>
              <div class="text-3xl font-black tracking-tight text-gray-900">${formatNumber(p.pos === '投手' ? pitching.appearances : batting.games)}</div>
            </div>
          </div>
        </div>
      ` : '';

      detailModal.innerHTML = `
        <!-- スクロール追従の閉じるボタン（右上） -->
        <div class="sticky top-0 z-[60] flex justify-end px-4 pt-safe-top pt-4">
          <button onclick="closeDetail()" aria-label="閉じる" class="h-11 w-11 rounded-full bg-white text-xl font-semibold leading-none text-[#C80815] shadow-[0_10px_24px_rgba(65,12,18,0.24)] transition active:scale-95">✕</button>
        </div>

        <div class="sticky top-0 z-30 -mt-[60px] relative min-h-[216px] w-full flex flex-col justify-end bg-[#C80815] px-4 pb-6 pt-safe-top">
          <div class="absolute top-0 right-0 h-64 w-64 rounded-full bg-[#E45A63]/20 blur-3xl -translate-y-1/2 translate-x-1/2"></div>
          <div class="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-[#9D101A]/45 via-[#C61A27]/16 to-transparent"></div>
          
          <div class="relative z-10 text-white flex justify-between items-end">
            <div>
              <div class="mb-1 flex items-center gap-3 text-sm font-medium opacity-80">
                <div class="tracking-widest">${p.displayRole}</div>
                <div>${p.throw_bat}</div>
              </div>
              <h1 class="text-4xl font-black tracking-tight leading-none">${p.name}</h1>
              ${p.nameKana ? `<div class="mt-1 text-sm font-medium tracking-[0.18em] opacity-80">${p.nameKana}</div>` : ''}
            </div>
            <div class="text-7xl font-black italic opacity-90 leading-none text-white">${p.no}</div>
          </div>
        </div>

        <div class="relative z-20 mx-auto max-w-2xl pt-4">
          ${statsHtml}
        </div>

        <div class="mx-auto max-w-2xl space-y-4 px-4 pb-8 pt-6">
          <div class="rounded-[28px] border border-gray-100 bg-white p-6 shadow-[0_10px_30px_rgba(15,23,42,0.06)]">
            <h3 class="text-sm font-bold text-gray-400 mb-4 tracking-wider">PROFILE</h3>
            <div class="space-y-4">
              ${createDetailRow('生年月日', p.birth)}
              ${createDetailRow('出身地', p.birthplace)}
              <div class="flex gap-4">
                <div class="flex-1">${createDetailRow('身長', p.height + ' cm')}</div>
                <div class="flex-1">${createDetailRow('体重', p.weight + ' kg')}</div>
              </div>
            </div>
          </div>

          <div class="rounded-[28px] border border-gray-100 bg-white p-6 pb-8 shadow-[0_10px_30px_rgba(15,23,42,0.06)]">
            <h3 class="text-sm font-bold text-gray-400 mb-4 tracking-wider">CAREER</h3>
            <div class="space-y-4">
              ${createDetailRow('出身校・経歴', p.history)}
              ${createDetailRow('出身校', p.school)}
              ${createDetailRow('ドラフト', p.draft)}
              ${createDetailRow('初出場', p.debut)}
            </div>
          </div>

          ${statBlocks.join('')}
        </div>
      `;
    }

    function createDetailRow(label, value) {
      return `
        <div class="border-b border-gray-100 pb-3 last:border-b-0 last:pb-0">
          <div class="text-[11px] font-bold tracking-[0.16em] text-gray-400">${label}</div>
          <div class="mt-1 text-sm font-medium leading-6 text-gray-900">${value}</div>
        </div>
      `;
    }

    function createStatsGrid(title, items) {
      return `
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
          <h3 class="text-sm font-bold text-gray-400 mb-4 tracking-wider">${title}</h3>
          <div class="grid grid-cols-2 gap-3">
            ${items.map(([label, value]) => `
              <div class="rounded-xl bg-gray-50 px-3 py-3">
                <div class="text-xs text-gray-500">${label}</div>
                <div class="mt-1 text-lg font-bold text-gray-900">${value}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    // --- 5. アクション関数 ---
    window.setPositionFilter = (filter) => {
      state.activePositionFilter = state.activePositionFilter === filter ? null : filter;
      renderFilters();
      renderPlayerList();
    };

    window.toggleDevelopmentFilter = () => {
      state.activeDevelopmentFilter = state.activeDevelopmentFilter ? null : true;
      renderFilters();
      renderPlayerList();
    };

    window.setHandednessFilter = (filter) => {
      state.activeHandedFilter = state.activeHandedFilter === filter ? null : filter;
      renderFilters();
      renderPlayerList();
    };

    window.setSort = (sortKey) => {
      if (state.sortKey === sortKey) {
        state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortKey = sortKey;
        state.sortDirection = 'asc';
      }
      renderFilters();
      renderPlayerList();
    };

    window.openDetail = (no) => {
      const player = playersData.find(p => p.no === no);
      if (player) {
        state.selectedPlayer = player;
        renderDetailModal();
        detailModal.classList.remove('hidden');
        document.body.style.overflow = 'hidden'; // 背面スクロール防止
      }
    };

    window.closeDetail = () => {
      state.selectedPlayer = null;
      detailModal.classList.add('hidden');
      document.body.style.overflow = '';
      detailModal.innerHTML = ''; // メモリ解放
    };

    // --- 6. イベントリスナー ---
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      if (state.searchQuery) {
        clearSearchBtn.classList.remove('hidden');
        
        // 検索時のアイコン色変更処理
        searchInput.classList.remove('text-white', 'bg-white/10');
        searchInput.classList.add('text-gray-900', 'bg-white');
      } else {
        clearSearchBtn.classList.add('hidden');
        searchInput.classList.remove('text-gray-900', 'bg-white');
        searchInput.classList.add('text-white', 'bg-white/10');
      }
      renderPlayerList();
    });

    clearSearchBtn.addEventListener('click', () => {
      state.searchQuery = '';
      searchInput.value = '';
      clearSearchBtn.classList.add('hidden');
      searchInput.classList.remove('text-gray-900', 'bg-white');
      searchInput.classList.add('text-white', 'bg-white/10');
      renderPlayerList();
    });

    // --- 7. 初期化 ---
    renderFilters();
    renderPlayerList();

  </script>
</body>
</html>
