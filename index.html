<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#132B4D">
  <title>CARP PLAYERS</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./players-data.js"></script>
  <script src="./npb-data.js"></script>

  <!-- Tailwind Custom Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* iOSのセーフエリア対応とスクロールバー非表示 */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .pt-safe-top { padding-top: env(safe-area-inset-top); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
  </style>
</head>
<body class="bg-[#132B4D] text-gray-900 font-sans antialiased pb-safe">

  <!-- Main View -->
  <div id="main-view" class="min-h-screen bg-[#132B4D]">
    <!-- Header & Search -->
    <div class="sticky top-0 z-40 shadow-sm">
      <div class="relative overflow-hidden bg-[#b00c15] pt-safe-top">
        <div class="absolute inset-y-0 left-0 w-16 bg-white/6 [clip-path:polygon(0_0,100%_0,72%_100%,0_100%)]"></div>
        <div class="absolute inset-y-0 right-0 w-16 bg-black/8 [clip-path:polygon(28%_0,100%_0,100%_100%,0_100%)]"></div>
        <div class="absolute inset-x-0 bottom-0 h-px bg-white/18"></div>
        <div class="relative flex items-center justify-between px-4 pb-5 pt-4">
          <button type="button" onclick="showPrevTopScreen()" aria-label="前の画面へ" class="flex h-11 w-11 items-center justify-center rounded-full text-[1.55rem] font-light leading-none text-white transition hover:text-white active:scale-95">‹</button>
          <img src="./carp-logo.svg" alt="CARP PLAYERS" class="h-10 w-auto max-w-[220px]">
          <button type="button" onclick="showNextTopScreen()" aria-label="次の画面へ" class="flex h-11 w-11 items-center justify-center rounded-full text-[1.55rem] font-light leading-none text-white transition hover:text-white active:scale-95">›</button>
        </div>
      </div>

      <div class="bg-white px-4 pb-4 pt-4">
        <div class="mb-3 text-[12px] font-semibold tracking-[0.18em] text-gray-900">選手一覧</div>
        <div id="filter-container" class="rounded-[22px] bg-[#132B4D]/4 px-2.5 pt-2.5 pb-2">
          <!-- JSで生成 -->
        </div>
      </div>
    </div>

    <!-- Player List -->
    <div id="player-list" class="grid grid-cols-1 gap-px pt-px pb-[calc(env(safe-area-inset-bottom)+112px)] md:grid-cols-2 lg:grid-cols-3">
      <!-- JSで生成 -->
    </div>

    <div id="search-stage" class="hidden fixed inset-0 z-[60] bg-[rgba(19,43,77,0.88)] px-4 pb-[calc(env(safe-area-inset-bottom)+96px)] pt-[calc(env(safe-area-inset-top)+84px)] backdrop-blur-sm">
      <!-- JSで生成 -->
    </div>

    <div id="search-dock" class="fixed inset-x-0 bottom-[calc(env(safe-area-inset-bottom)+20px)] z-[65] flex justify-center px-4"></div>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 z-[95] bg-[#132B4D] overflow-y-auto">
    <!-- JSで生成 -->
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="hidden fixed inset-0 z-[80] bg-[#132B4D] overflow-y-auto">
    <!-- JSで生成 -->
  </div>

  <!-- Game Modal -->
  <div id="game-modal" class="hidden fixed inset-0 z-[85] bg-[#132B4D] overflow-y-auto">
    <!-- JSで生成 -->
  </div>

  <script>
    // --- 1. データ定義 (JSON) ---
    function formatAverage(value) {
      if (value === null || value === undefined || value === '-') return '-';
      const numeric = Number(value);
      if (Number.isNaN(numeric)) return String(value);
      return numeric.toFixed(3).replace(/^0/, '');
    }

    function formatNumber(value, digits = 0) {
      if (value === null || value === undefined || value === '') return '-';
      const numeric = Number(value);
      if (Number.isNaN(numeric)) return String(value);
      return digits > 0 ? numeric.toFixed(digits) : String(numeric);
    }

    function hasAnyStat(stats = {}) {
      return Object.values(stats).some(value => value !== null && value !== undefined && value !== '');
    }

    function formatDraftLabel(draft) {
      if (!draft || draft === '-') return null;
      return String(draft)
        .replace(/選手ドラフト/g, '')
        .replace(/ドラフト/g, '')
        .replace(/選手/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getNpbPhotoUrl(playerNo, npbId) {
      if (!playerNo || !npbId) return null;
      const season = new Date().getFullYear();
      const paddedNo = String(playerNo).padStart(3, '0');
      return `https://p.npb.jp/players_photo/${season}/180/c/${paddedNo}_${npbId}.jpg`;
    }

    function normalizeHistoryForCompare(value) {
      return String(value || '')
        .normalize('NFKC')
        .replace(/[ 　]/g, '')
        .replace(/[‐‑‒–—―ー－]/g, '-')
        .replace(/[()（）]/g, '')
        .replace(/・/g, '')
        .replace(/高校/g, '高')
        .replace(/商業高/g, '商高')
        .replace(/日本大/g, '日大')
        .replace(/大学/g, '大')
        .replace(/埼玉西武ライオンズ|西武ライオンズ/g, '埼玉西武')
        .replace(/シンシナティ・レッズ|シンシナティレッズ/g, 'シンシナティ')
        .replace(/\s+/g, '')
        .trim();
    }

    function resolveHistoryFields(clubHistory, npbHistory) {
      const club = clubHistory && clubHistory !== '-' ? String(clubHistory).trim() : null;
      const npb = npbHistory && npbHistory !== '-' ? String(npbHistory).trim() : null;
      const normalizedClub = normalizeHistoryForCompare(club);
      const normalizedNpb = normalizeHistoryForCompare(npb);

      if (npb && club) {
        if (normalizedClub === normalizedNpb) {
          return { canonical: npb, detail: null, club, npb };
        }
        if (normalizedClub.includes(normalizedNpb)) {
          return { canonical: npb, detail: club, club, npb };
        }
        if (normalizedNpb.includes(normalizedClub)) {
          return { canonical: npb, detail: null, club, npb };
        }
        return { canonical: npb, detail: club, club, npb };
      }

      if (npb) return { canonical: npb, detail: null, club: null, npb };
      if (club) return { canonical: club, detail: null, club, npb: null };
      return { canonical: '-', detail: null, club: null, npb: null };
    }

    function buildPlayerChips(player) {
      const chips = [player.pos];
      if (player.status === '育成') chips.push('育成');

      const throwBat = String(player.throw_bat || '');
      const match = throwBat.match(/(右投|左投)(右打|左打|両打)/);
      if (match) {
        chips.push(match[1], match[2]);
      } else if (throwBat && throwBat !== '-') {
        chips.push(throwBat);
      }

      return chips;
    }

    function parseThrowBat(throwBat) {
      const normalized = String(throwBat || '');
      const match = normalized.match(/(右投|左投)?(右打|左打|両打)?/);
      return {
        throwHand: match?.[1] || null,
        batHand: match?.[2] || null
      };
    }

    function normalizeSearchText(value) {
      const variantMap = {
        '薗': '園',
        '﨑': '崎',
        '髙': '高',
        '塚': '塚',
        '澤': '沢',
        '邉': '辺',
        '邊': '辺',
        '濵': '浜',
        '會': '会',
        '嶋': '島',
        '冨': '富',
        '眞': '真',
        '德': '徳',
        '國': '国',
        '廣': '広'
      };

      return String(value || '')
        .normalize('NFKC')
        .replace(/[ァ-ヶ]/g, char => String.fromCharCode(char.charCodeAt(0) - 0x60))
        .replace(/[ 　・.\-ー]/g, '')
        .replace(/[薗﨑髙塚澤邉邊濵會嶋冨眞德國廣]/g, char => variantMap[char] || char)
        .toLowerCase();
    }

    function calculateAge(birth) {
      if (!birth || birth === '-') return null;
      const normalized = String(birth).replace(/年|月/g, '-').replace(/日/g, '');
      const date = new Date(normalized);
      if (Number.isNaN(date.getTime())) return null;

      const today = new Date();
      let age = today.getFullYear() - date.getFullYear();
      const hasHadBirthday =
        today.getMonth() > date.getMonth() ||
        (today.getMonth() === date.getMonth() && today.getDate() >= date.getDate());

      if (!hasHadBirthday) age -= 1;
      return age;
    }

    const PLAYER_ASSIGNMENTS_KEY = 'carp-player-assignments-v1';
    const PLAYER_GAME_STATUS_KEY = 'carp-player-game-status-v1';
    const settingsPositionOrder = ['投手', '捕手', '内野手', '外野手'];
    const defaultGamePositions = ['投', '捕', '一', '二', '三', '遊', '左', '中', '右'];
    const gameEntryPositionLayout = [
      ['左', '中', '右'],
      ['三', '遊', '二', '一'],
      ['投', '捕', 'DH'],
      ['unset']
    ];
    const battingOrderLayout = [
      [1, 2, 3],
      [4, 5, 6],
      [7, 8, 9]
    ];
    const gamePositionPickerLayout = [
      ['左', '中', '右'],
      ['三', '遊', '二', '一'],
      ['投', '捕', 'DH'],
      ['bench', 'cancel']
    ];
    const gamePositionLabels = {
      '投': 'ピッチャー',
      '捕': 'キャッチャー',
      '一': 'ファースト',
      '二': 'セカンド',
      '三': 'サード',
      '遊': 'ショート',
      '左': 'レフト',
      '中': 'センター',
      '右': 'ライト',
      'DH': 'DH',
      'unset': '未定',
      'bench': 'ベンチ',
      'cancel': 'キャンセル'
    };

    function createDefaultAssignments() {
      return Object.fromEntries(playersData.map(player => {
        const rosterStatus = player.status === '育成' ? '育成' : '支配下';
        return [player.no, {
          rosterStatus,
          squad: '2軍',
          bench: false
        }];
      }));
    }

    function loadPlayerAssignments() {
      const defaults = createDefaultAssignments();
      try {
        const saved = JSON.parse(localStorage.getItem(PLAYER_ASSIGNMENTS_KEY) || '{}');
        return Object.fromEntries(playersData.map(player => {
          const fallback = defaults[player.no];
          const current = saved?.[player.no] || {};
          const rosterStatus = current.rosterStatus === '育成' ? '育成' : fallback.rosterStatus;
          const squadOptions = rosterStatus === '支配下' ? ['1軍', '2軍', '3軍'] : ['2軍', '3軍'];
          const squad = squadOptions.includes(current.squad) ? current.squad : fallback.squad;
          const bench = rosterStatus === '支配下' && squad === '1軍' ? Boolean(current.bench) : false;
          return [player.no, { rosterStatus, squad, bench }];
        }));
      } catch (error) {
        return defaults;
      }
    }

    function savePlayerAssignments() {
      try {
        localStorage.setItem(PLAYER_ASSIGNMENTS_KEY, JSON.stringify(state.playerAssignments));
      } catch (error) {
        // 保存できない環境でも画面動作は維持する
      }
    }

    function normalizeBattingOrder(value) {
      if (Number.isInteger(value)) return value;
      if (typeof value === 'string' && /^\d+$/.test(value)) return Number(value);
      return null;
    }

    function loadGameStatuses() {
      try {
        const raw = JSON.parse(localStorage.getItem(PLAYER_GAME_STATUS_KEY) || '{}');
        return Object.fromEntries(Object.entries(raw).map(([playerNo, value]) => {
          if (typeof value === 'string') {
            return [playerNo, { status: value, battingOrder: null, fieldPosition: null }];
          }
          return [playerNo, {
            status: ['出場', '控え', '退場'].includes(value?.status) ? value.status : '控え',
            battingOrder: normalizeBattingOrder(value?.battingOrder),
            fieldPosition: value?.fieldPosition || null
          }];
        }));
      } catch (error) {
        return {};
      }
    }

    function saveGameStatuses() {
      try {
        localStorage.setItem(PLAYER_GAME_STATUS_KEY, JSON.stringify(state.gameStatuses));
      } catch (error) {
        // 保存できない環境でも画面動作は維持する
      }
    }

    function getPlayerAssignment(playerNo) {
      return state.playerAssignments[playerNo] || {
        rosterStatus: '支配下',
        squad: '2軍',
        bench: false
      };
    }

    function getRosterStatus(player) {
      return getPlayerAssignment(player.no).rosterStatus;
    }

    function getGameEntry(playerNo) {
      const entry = state.gameStatuses[playerNo];
      return {
        status: ['出場', '控え', '退場'].includes(entry?.status) ? entry.status : '控え',
        battingOrder: normalizeBattingOrder(entry?.battingOrder),
        fieldPosition: entry?.fieldPosition || null
      };
    }

    function getGameStatus(playerNo) {
      return getGameEntry(playerNo).status;
    }

    function getGamePositions() {
      return [...defaultGamePositions, 'DH'];
    }

    function getDefaultFieldPosition(player) {
      if (player.pos === '投手') return '投';
      if (player.pos === '捕手') return '捕';
      if (player.pos === '外野手') return '中';
      return '遊';
    }

    function getRecommendedFieldPosition(player, gameMembers = playersData) {
      const activeEntries = gameMembers
        .filter(item => getGameStatus(item.no) === '出場')
        .map(item => getGameEntry(item.no).fieldPosition)
        .filter(Boolean);

      if (player.pos === '投手') {
        return hasDhLineup(gameMembers) ? '投' : '投';
      }
      if (player.pos === '捕手') {
        return activeEntries.includes('捕') ? '捕' : '捕';
      }
      if (player.pos === '内野手') {
        const candidates = ['遊', '二', '三', '一'];
        return candidates.find(position => !activeEntries.includes(position)) || '遊';
      }
      if (player.pos === '外野手') {
        const candidates = ['中', '左', '右'];
        return candidates.find(position => !activeEntries.includes(position)) || '中';
      }
      return getDefaultFieldPosition(player);
    }

    function getActiveBattingOrderPlayers(gameMembers = playersData) {
      return gameMembers
        .filter(player => getGameStatus(player.no) === '出場' && getGameEntry(player.no).battingOrder !== null)
        .sort((a, b) => (getGameEntry(a.no).battingOrder ?? 99) - (getGameEntry(b.no).battingOrder ?? 99));
    }

    function getFirstEmptyBattingOrder(gameMembers = playersData) {
      const used = new Set(getActiveBattingOrderPlayers(gameMembers).map(player => getGameEntry(player.no).battingOrder));
      for (let order = 1; order <= 9; order += 1) {
        if (!used.has(order)) return order;
      }
      return 1;
    }

    function hasDhLineup(gameMembers = playersData) {
      return getActiveBattingOrderPlayers(gameMembers).some(player => getGameEntry(player.no).fieldPosition === 'DH');
    }

    function getActivePitcher(gameMembers = playersData) {
      return gameMembers.find(player => {
        const entry = getGameEntry(player.no);
        return entry.status === '出場' && entry.fieldPosition === '投' && entry.battingOrder === null;
      }) || null;
    }

    function getFieldPositionLabel(fieldPosition) {
      return gamePositionLabels[fieldPosition] || '未定';
    }

    function getDisplayChips(player) {
      const chips = [player.pos];
      if (getRosterStatus(player) === '育成') chips.push('育成');

      const throwBat = String(player.throw_bat || '');
      if (throwBat && throwBat !== '-') {
        chips.push(throwBat);
      }

      return chips;
    }

    function mergeStats2025(baseStats = {}, overrideStats = {}) {
      return {
        batting: { ...(baseStats.batting || {}), ...(overrideStats.batting || {}) },
        pitching: { ...(baseStats.pitching || {}), ...(overrideStats.pitching || {}) },
        fieldingSummary: overrideStats.fieldingSummary ?? baseStats.fieldingSummary ?? null
      };
    }

    function mergeStatsByYear(baseStatsByYear = {}, overrideStatsByYear = {}) {
      const years = new Set([
        ...Object.keys(baseStatsByYear || {}),
        ...Object.keys(overrideStatsByYear || {})
      ]);
      return Object.fromEntries([...years].map(year => [
        year,
        mergeStats2025(baseStatsByYear?.[year], overrideStatsByYear?.[year])
      ]));
    }

    function normalizePlayer(player) {
      const npbPlayer = window.npbData?.players?.[player.name] || {};
      const npbId = player.npbId || npbPlayer.npbId || null;
      const npbStats = (npbId && window.npbData?.stats2025?.[npbId]) || npbPlayer.stats2025 || null;
      const npbStatsByYear = (npbId && window.npbData?.statsByYear?.[npbId]) || npbPlayer.statsByYear || {};
      const mergedStats2025 = mergeStats2025(player.stats2025, npbStats || {});
      const mergedStatsByYear = mergeStatsByYear(player.statsByYear, npbStatsByYear);
      const batting = mergedStats2025.batting ?? {};
      const pitching = mergedStats2025.pitching ?? {};
      const historyFields = resolveHistoryFields(player.history, npbPlayer.history);
      const displayStatus = npbPlayer.registration || player.registration || player.status;
      const throwBat = npbPlayer.throw_bat || player.throw_bat;
      const { throwHand, batHand } = parseThrowBat(throwBat);
      const displayRole = !displayStatus || displayStatus === player.pos || displayStatus.includes(player.pos)
        ? displayStatus || player.pos
        : `${displayStatus} • ${player.pos}`;

      return {
        ...player,
        npbId,
        npbUrl: npbId ? `https://npb.jp/bis/players/${npbId}.html` : null,
        photoUrl: getNpbPhotoUrl(player.no, npbId),
        school: npbPlayer.school || player.school || '-',
        height: npbPlayer.height ?? player.height ?? '-',
        weight: npbPlayer.weight ?? player.weight ?? '-',
        birth: npbPlayer.birth || player.birth || '-',
        birthplace: npbPlayer.birthplace || player.birthplace || '-',
        throw_bat: throwBat || '-',
        history: historyFields.canonical,
        historyCanonical: historyFields.canonical,
        historyDetail: historyFields.detail,
        historyClub: historyFields.club,
        historyNpb: historyFields.npb,
        draft: npbPlayer.draft || player.draft || '-',
        draftLabel: formatDraftLabel(npbPlayer.draft || player.draft),
        debut: npbPlayer.debut || player.debut || '-',
        age: calculateAge(npbPlayer.birth || player.birth),
        chips: buildPlayerChips({ ...player, throw_bat: throwBat }),
        throwHand,
        batHand,
        displayStatus,
        displayRole,
        avg: formatAverage(npbStats?.batting?.average ?? player.avg),
        era: formatNumber(npbStats?.pitching?.era ?? player.era, 2),
        stats2025: mergedStats2025,
        statsByYear: mergedStatsByYear,
        hasBattingStats: hasAnyStat(batting),
        hasPitchingStats: hasAnyStat(pitching),
        searchIndex: normalizeSearchText([
          player.name,
          npbPlayer.name,
          player.nameKana,
          npbPlayer.nameKana,
          npbPlayer.school || player.school,
          npbPlayer.birthplace || player.birthplace,
          player.no,
          npbPlayer.draft || player.draft
        ].filter(Boolean).join(' ')),
        sourceMeta: {
          ...(player.sourceMeta || {}),
          npbLinked: Boolean(npbId),
          npbStatsImported: Boolean(npbStats),
          npbStatsByYearImported: Object.keys(npbStatsByYear || {}).length > 0
        }
      };
    }

    const playersData = (window.playersData || []).map(normalizePlayer);

    // --- 2. 状態管理 ---
    let state = {
      searchOpen: false,
      searchCategory: null,
      searchGroup: null,
      searchValue: null,
      settingsOpen: false,
      gameOpen: false,
      gameViewIndex: 0,
      pendingGameSlot: null,
      pendingGameEntry: null,
      pendingPositionChange: null,
      pendingOutPlayerNo: null,
      pendingClearLineup: false,
      playerAssignments: loadPlayerAssignments(),
      gameStatuses: loadGameStatuses(),
      rosterFilter: '支配下',
      activePositionFilter: '全選手',
      activeThrowFilter: null,
      activeBatFilter: null,
      sortMode: 'numberAsc',
      selectedPlayer: null,
      activeStatInfo: null,
      battingStatsMode: 'slash'
    };

    const positionFilters = ['全選手', '投手', '野手', '捕手', '内野手', '外野手'];
    const rosterFilterOrder = ['支配下', '1軍', '2軍', '3軍', '育成'];
    const searchCategories = [
      { key: 'number', label: '背番号' },
      { key: 'name', label: '名前' }
    ];
    const nameSearchGroupRows = [
      ['ア', 'イ', 'ウ', 'エ', 'オ'],
      ['カ', 'キ', 'ク', 'ケ', 'コ'],
      ['サ', 'シ', 'ス', null, null],
      ['タ', 'ツ', 'ト', null, null],
      ['ナ', 'ニ', 'ノ', null, null],
      ['ハ', 'ヒ', 'フ', 'ホ', null],
      ['マ', 'モ', null, null, null],
      ['ヤ', 'ワ', null, null, null]
    ];
    const rosterFilterLabels = {
      '支配下': '支配下登録',
      '1軍': '一軍',
      '2軍': '二軍',
      '3軍': '三軍',
      '育成': '育成登録'
    };

    // --- 3. DOM要素 ---
    const searchDock = document.getElementById('search-dock');
    const searchStage = document.getElementById('search-stage');
    const filterContainer = document.getElementById('filter-container');
    const playerListContainer = document.getElementById('player-list');
    const mainView = document.getElementById('main-view');
    const detailModal = document.getElementById('detail-modal');
    const settingsModal = document.getElementById('settings-modal');
    const gameModal = document.getElementById('game-modal');

    function updateBodyScroll() {
      document.body.style.overflow = state.selectedPlayer || state.settingsOpen || state.gameOpen ? 'hidden' : '';
    }

    function getNameSearchSeed(player) {
      const rawKana = String(player.nameKana || '')
        .normalize('NFKC')
        .replace(/[ 　]/g, '');

      if (rawKana && !/^[A-Za-z]/.test(rawKana)) {
        return rawKana;
      }

      return String(player.name || '')
        .normalize('NFKC')
        .replace(/^[A-Za-z]\./, '')
        .replace(/[ 　]/g, '');
    }

    function getPlayerNameInitial(player) {
      const seed = getNameSearchSeed(player);
      return seed ? seed[0].toUpperCase() : '';
    }

    function getNameSearchGroup(player) {
      const initial = getPlayerNameInitial(player);
      return nameSearchGroupRows.flat().filter(Boolean).find(group => group.includes(initial)) || null;
    }

    function getSearchCategoryLabel(key) {
      return searchCategories.find(category => category.key === key)?.label || '';
    }

    function getSearchResultPlayers() {
      if (!state.searchCategory || !state.searchGroup) return [];
      if (state.searchCategory === 'name') {
        return playersData
          .filter(player => getNameSearchGroup(player) === state.searchGroup)
          .sort((a, b) => Number(a.no) - Number(b.no));
      }
      return [];
    }

    function renderSearchDock() {
      if (state.selectedPlayer || state.settingsOpen || state.gameOpen) {
        searchDock.classList.add('hidden');
        return;
      }

      searchDock.classList.remove('hidden');
      if (!state.searchOpen) {

    // --- 4. レンダリング関数 ---
    function renderFilters() {
      const filterButtonTone = (active) => active
        ? 'bg-[#b00c15] text-white shadow-[0_8px_18px_rgba(108,6,16,0.24)]'
        : 'bg-[#132B4D] text-white hover:bg-[#19385f]';
      const secondaryFilterTone = (active) => active
        ? 'border-[#d9dee8] bg-white text-[#132B4D]'
        : 'border-[#d9dee8] bg-white text-[#132B4D] hover:bg-gray-50';

      const rosterButton = `
        <button
          onclick="toggleRosterFilter()"

      const positionButtons = positionFilters.map(filter => `

        >
          ${filter}
        </button>
      `).join('');

      const throwButton = `
        <button
          onclick="cycleThrowFilter()"

        >

        </button>
      `;

      const batButton = `
        <button
          onclick="cycleBatFilter()"
          class="min-w-0 rounded-xl border px-0 py-2 text-[11px] font-semibold tracking-tight transition-colors ${secondaryFilterTone(Boolean(state.activeBatFilter))}"
        >
          ${state.activeBatFilter || '右打・左打'}
        </button>
      `;

      filterContainer.innerHTML = `
        <div class="grid grid-cols-6 gap-1.5">
          ${positionButtons}
        </div>
        <div class="mt-2.5 grid grid-cols-3 gap-1.5">
          ${rosterButton}${throwButton}${batButton}
        </div>
      `;
    }

    function comparePlayers(a, b) {
      let result = 0;

      if (state.sortMode === 'ageAsc' || state.sortMode === 'ageDesc') {
        const aValue = a.age ?? Number.POSITIVE_INFINITY;
        const bValue = b.age ?? Number.POSITIVE_INFINITY;
        if (aValue !== bValue) result = aValue - bValue;
      } else {
        result = Number(a.no) - Number(b.no);
      }

      if (result === 0) {
        result = a.name.localeCompare(b.name, 'ja');
      }

      return state.sortMode === 'ageDesc' ? result * -1 : result;
    }

    function getAvailableDetailYears(player) {
      return Object.keys(player?.statsByYear || {})
        .filter(year => {
          const yearStats = player.statsByYear?.[year];
          return hasAnyStat(yearStats?.batting || {}) || hasAnyStat(yearStats?.pitching || {}) || Boolean(yearStats?.fieldingSummary);
        })
        .sort((a, b) => Number(b) - Number(a));
    }

    function getStatYears(player) {
      return getAvailableDetailYears(player);
    }

    function inningsToOuts(value) {
      if (value === null || value === undefined || value === '' || value === '-') return null;
      const text = String(value);
      const [wholePart, decimalPart = '0'] = text.split('.');
      const whole = Number(wholePart);
      const decimal = Number(decimalPart);
      if (Number.isNaN(whole) || Number.isNaN(decimal)) return null;
      return (whole * 3) + decimal;
    }

    function formatPercent(value, digits = 1) {
      if (value === null || value === undefined || value === '' || Number.isNaN(Number(value))) return '-';
      return `${(Number(value) * 100).toFixed(digits)}%`;
    }

    function formatInningsFromOuts(outs) {
      if (outs === null || outs === undefined || Number.isNaN(Number(outs))) return '-';
      const numericOuts = Number(outs);
      const whole = Math.floor(numericOuts / 3);
      const remainder = numericOuts % 3;
      return remainder === 0 ? String(whole) : `${whole}.${remainder}`;
    }

    function calculateWhip(pitching = {}) {
      const outs = inningsToOuts(pitching.inningsPitched);
      if (!outs) return null;
      const innings = outs / 3;
      const baserunners = Number(pitching.hitsAllowed || 0) + Number(pitching.walks || 0);
      return baserunners / innings;
    }

    function calculateKMinusBbRate(pitching = {}) {
      const battersFaced = Number(pitching.battersFaced || 0);
      if (!battersFaced) return null;
      return (Number(pitching.strikeouts || 0) - Number(pitching.walks || 0)) / battersFaced;
    }

    function calculateOps(batting = {}) {
      const obp = Number(batting.onBasePercentage);
      const slg = Number(batting.sluggingPercentage);
      if (Number.isNaN(obp) || Number.isNaN(slg)) return null;
      return obp + slg;
    }

    function calculateRate(part, total) {
      const denominator = Number(total || 0);
      if (!denominator) return null;
      return Number(part || 0) / denominator;
    }

    function calculateBattingAggregate(statsList) {
      const totals = statsList.reduce((acc, stats) => {
        if (!hasAnyStat(stats)) return acc;
        acc.games += Number(stats.games || 0);
        acc.plateAppearances += Number(stats.plateAppearances || 0);
        acc.atBats += Number(stats.atBats || 0);
        acc.hits += Number(stats.hits || 0);
        acc.totalBases += Number(stats.totalBases || 0);
        acc.walks += Number(stats.walks || 0);
        acc.hitByPitch += Number(stats.hitByPitch || 0);
        acc.sacrificeFlies += Number(stats.sacrificeFlies || 0);
        acc.strikeouts += Number(stats.strikeouts || 0);
        acc.homeRuns += Number(stats.homeRuns || 0);
        return acc;
      }, {
        games: 0,
        plateAppearances: 0,
        atBats: 0,
        hits: 0,
        totalBases: 0,
        walks: 0,
        hitByPitch: 0,
        sacrificeFlies: 0,
        strikeouts: 0,
        homeRuns: 0
      });

      if (!totals.plateAppearances && !totals.games) return null;

      const obpDenominator = totals.atBats + totals.walks + totals.hitByPitch + totals.sacrificeFlies;
      const avg = totals.atBats ? totals.hits / totals.atBats : null;
      const obp = obpDenominator ? (totals.hits + totals.walks + totals.hitByPitch) / obpDenominator : null;
      const slg = totals.atBats ? totals.totalBases / totals.atBats : null;
      return {
        ...totals,
        average: avg,
        onBasePercentage: obp,
        sluggingPercentage: slg
      };
    }

    function calculatePitchingAggregate(statsList) {
      const totals = statsList.reduce((acc, stats) => {
        if (!hasAnyStat(stats)) return acc;
        acc.appearances += Number(stats.appearances || 0);
        acc.outs += Number(inningsToOuts(stats.inningsPitched) || 0);
        acc.hitsAllowed += Number(stats.hitsAllowed || 0);
        acc.walks += Number(stats.walks || 0);
        acc.strikeouts += Number(stats.strikeouts || 0);
        acc.battersFaced += Number(stats.battersFaced || 0);
        acc.earnedRuns += Number(stats.earnedRuns || 0);
        return acc;
      }, {
        appearances: 0,
        outs: 0,
        hitsAllowed: 0,
        walks: 0,
        strikeouts: 0,
        battersFaced: 0,
        earnedRuns: 0
      });

      if (!totals.appearances && !totals.outs) return null;

      return {
        appearances: totals.appearances,
        outs: totals.outs,
        inningsPitched: formatInningsFromOuts(totals.outs),
        hitsAllowed: totals.hitsAllowed,
        walks: totals.walks,
        strikeouts: totals.strikeouts,
        battersFaced: totals.battersFaced,
        earnedRuns: totals.earnedRuns,
        era: totals.outs ? (totals.earnedRuns * 27) / totals.outs : null
      };
    }

    function renderPlayerList() {
      const filtered = playersData.filter(p => {
        const matchesSearch = true;
                              
        let matchesPositionFilter = true;
        if (state.activePositionFilter && state.activePositionFilter !== '全選手') {
          matchesPositionFilter = state.activePositionFilter === '野手'
            ? p.pos !== '投手'
            : p.pos === state.activePositionFilter;
        }

        const assignment = getPlayerAssignment(p.no);
        const rosterStatus = assignment.rosterStatus;
        const matchesRosterFilter =
          state.rosterFilter === '支配下' ? rosterStatus === '支配下' :
          state.rosterFilter === '育成' ? rosterStatus === '育成' :
          assignment.squad === state.rosterFilter;

        let matchesThrowFilter = true;
        if (state.activeThrowFilter) {
          matchesThrowFilter = p.throwHand === state.activeThrowFilter;
        }

        let matchesBatFilter = true;
        if (state.activeBatFilter) {
          matchesBatFilter = p.batHand === state.activeBatFilter || p.batHand === '両打';
        }

        return matchesSearch && matchesPositionFilter && matchesRosterFilter && matchesThrowFilter && matchesBatFilter;
      }).sort(comparePlayers);

      if (filtered.length === 0) {
        playerListContainer.innerHTML = `<div class="col-span-full py-12 text-center text-gray-400">該当する選手が見つかりません</div>`;
        return;

      playerListContainer.innerHTML = filtered.map(p => `

      `).join('');
    }

    function renderDetailModal() {
      const p = state.selectedPlayer;
      if (!p) return;

      const statYears = getStatYears(p);
      const latestYear = statYears[0];
      const latestStats = (latestYear && p.statsByYear?.[latestYear]) || p.stats2025 || {};
      const statBlocks = [];

      if (p.pos === '投手') {
        const yearlyPitchingStats = statYears
          .map(year => p.statsByYear?.[year]?.pitching || {})
          .filter(stats => hasAnyStat(stats));
        const totalPitching = calculatePitchingAggregate(yearlyPitchingStats);
        const rows = [
          totalPitching ? [
            '通算',
            formatNumber(totalPitching.appearances),
            formatInningsFromOuts(totalPitching.outs),
            formatNumber(totalPitching.era, 2),
            formatNumber(calculateWhip(totalPitching), 2),
            formatPercent(calculateKMinusBbRate(totalPitching))
          ] : null,
          ...statYears.map(year => {
            const pitching = p.statsByYear?.[year]?.pitching || {};
            if (!hasAnyStat(pitching)) return null;
            return [
              year,
              formatNumber(pitching.appearances),
              formatNumber(pitching.inningsPitched, 1),
              formatNumber(pitching.era, 2),
              formatNumber(calculateWhip(pitching), 2),
              formatPercent(calculateKMinusBbRate(pitching))
            ];
          })
        ].filter(Boolean);

        if (rows.length) {
          statBlocks.push(
          createRecentStatsTable('投手成績', ['年', '試合', '投球回', '防御率', 'WHIP', 'K-BB%'], rows)
          );
        }
      } else {
        const yearlyBattingStats = statYears
          .map(year => p.statsByYear?.[year]?.batting || {})
          .filter(stats => hasAnyStat(stats));
        const totalBatting = calculateBattingAggregate(yearlyBattingStats);
        const useSlashStats = state.battingStatsMode === 'slash';
        const rows = [
          totalBatting ? [
            '通算',
            formatNumber(totalBatting.games),
            formatNumber(totalBatting.plateAppearances),
            formatAverage(calculateOps(totalBatting)),
            useSlashStats
              ? formatAverage(totalBatting.average)
              : formatPercent(calculateRate(totalBatting.walks, totalBatting.plateAppearances)),
            useSlashStats
              ? formatAverage(totalBatting.onBasePercentage)
              : formatPercent(calculateRate(totalBatting.strikeouts, totalBatting.plateAppearances)),
            useSlashStats
              ? formatAverage(totalBatting.sluggingPercentage)
              : formatNumber(totalBatting.homeRuns)
          ] : null,
          ...statYears.map(year => {
            const batting = p.statsByYear?.[year]?.batting || {};
            if (!hasAnyStat(batting)) return null;
            return [
              year,
              formatNumber(batting.games),
              formatNumber(batting.plateAppearances),
              formatAverage(calculateOps(batting)),
              useSlashStats
                ? formatAverage(batting.average)
                : formatPercent(calculateRate(batting.walks, batting.plateAppearances)),
              useSlashStats
                ? formatAverage(batting.onBasePercentage)
                : formatPercent(calculateRate(batting.strikeouts, batting.plateAppearances)),
              useSlashStats
                ? formatAverage(batting.sluggingPercentage)
                : formatNumber(batting.homeRuns)
            ];
          })
        ].filter(Boolean);

        if (rows.length) {
          statBlocks.push(
          createRecentStatsTable(
            '打撃成績',
            ['年', '試合', '打席', 'OPS', ...(useSlashStats ? ['打率', '出塁率', '長打率'] : ['四球率', '三振率', '本塁打'])],
            rows,
            { onClick: 'toggleBattingStatsMode', toggleHint: useSlashStats ? 'タップで四球率表示' : 'タップで打率表示' }
          )
          );
        }
      }

      if (latestStats?.fieldingSummary) {
        statBlocks.push(`
          <div class="border border-white/70 bg-white px-5 py-5 shadow-[0_18px_46px_rgba(15,23,42,0.08)]">
            <h3 class="mb-3 text-[13px] font-black tracking-[0.16em] text-gray-400">守備成績</h3>
            <div class="text-sm font-medium leading-7 text-gray-900">${latestStats.fieldingSummary}</div>
          </div>
        `);
      }

      const statInfo = state.activeStatInfo ? statInfoMap[state.activeStatInfo] : null;

      detailModal.innerHTML = `
        <div class="sticky top-0 z-30 shadow-sm">
          <div class="relative overflow-hidden bg-[#b00c15] pt-safe-top">
            <div class="absolute inset-y-0 left-0 w-16 bg-white/6 [clip-path:polygon(0_0,100%_0,72%_100%,0_100%)]"></div>
            <div class="absolute inset-y-0 right-0 w-16 bg-black/8 [clip-path:polygon(28%_0,100%_0,100%_100%,0_100%)]"></div>
            <div class="absolute inset-x-0 bottom-0 h-px bg-white/18"></div>
            <div class="relative flex items-center justify-between px-4 pb-5 pt-4">
              <div class="h-11 w-11"></div>
              <img src="./carp-logo.svg" alt="" class="h-10 w-auto max-w-[220px]">
              <div class="h-11 w-11"></div>
            </div>
          </div>

          <div class="relative overflow-hidden bg-white px-5 pb-4 pt-4">
            <div class="relative">
              <div class="absolute -right-4 -bottom-8 text-[8.8rem] font-black italic leading-none tracking-[-0.08em] text-[#132B4D] opacity-[0.04] pointer-events-none">${p.no}</div>
              <div class="absolute right-1 top-1 text-[3.9rem] font-black italic leading-none tracking-[-0.08em] text-[#b00c15]">${p.no}</div>
              <div class="flex min-w-0 items-start gap-4 pr-16">
                <div class="shrink-0 pt-0.5">
                  <img
                    src="${p.photoUrl || ''}"
                    alt="${p.name}"
                    class="h-[92px] w-[72px] object-cover object-top bg-gray-100 shadow-[0_10px_24px_rgba(15,23,42,0.16)]"
                    onerror="this.style.display='none';"
                  >
                </div>
                <div class="min-w-0 flex-1 max-w-[72%] pt-0.5">
                <div class="mb-2 text-[12px] font-bold tracking-[0.08em] text-gray-500">
                  ${[p.displayRole, p.throw_bat].filter(Boolean).join('　')}
                </div>
                <div class="min-w-0">
                <h1 class="text-[1.65rem] font-black tracking-[-0.045em] leading-[1.04] text-gray-950">${p.name}</h1>
                </div>
                ${p.nameKana ? `<div class="mt-2 text-[13px] font-semibold tracking-[0.01em] text-gray-500">${p.nameKana}</div>` : ''}
                </div>
              </div>
            </div>
          </div>
        </div>

        <button onclick="closeDetail()" aria-label="閉じる" class="fixed left-1/2 bottom-[calc(env(safe-area-inset-bottom)+20px)] z-[65] flex h-14 w-14 -translate-x-1/2 items-center justify-center rounded-full bg-[#b00c15] text-[2rem] leading-none text-white shadow-[0_18px_38px_rgba(2,6,23,0.28)] [text-shadow:0_1px_2px_rgba(2,6,23,0.45)] backdrop-blur-md transition active:scale-95">✕</button>

        <div class="pt-0.5">
          <div class="mx-auto max-w-2xl space-y-4 px-4 pb-[calc(env(safe-area-inset-bottom)+112px)] pt-3">
            <div class="border border-white/70 bg-white px-5 py-5 shadow-[0_18px_46px_rgba(15,23,42,0.08)]">
              <h3 class="mb-4 text-[13px] font-black tracking-[0.16em] text-gray-400">プロフィール</h3>
              <div class="grid grid-cols-[1.28fr_0.78fr_0.78fr_1.52fr] gap-2">
                ${createCompactDetailCell('生年月日', p.birth)}
                ${createCompactDetailCell('身長', `${p.height} cm`)}
                ${createCompactDetailCell('体重', `${p.weight} kg`)}
                ${createCompactDetailCell('出身地', p.birthplace)}
              </div>
              <div class="mt-4 space-y-4">
                ${createDetailRow('出身校・経歴', p.historyDetail || p.historyCanonical || p.history)}
                ${createDetailRow('ドラフト', p.draft)}
              </div>
            </div>

            ${statBlocks.join('')}
          </div>
        </div>

        ${statInfo ? `
          <div class="fixed inset-0 z-[75] flex items-center justify-center bg-[#132B4D]/48 px-6 py-10" onclick="closeStatInfo()">
            <div class="mx-auto w-full max-w-sm rounded-[28px] bg-white p-6 shadow-[0_24px_60px_rgba(2,6,23,0.24)]" onclick="event.stopPropagation()">
              <div class="text-lg font-black tracking-tight text-gray-900">${statInfo.title}</div>
              <div class="mt-3 text-sm font-medium leading-6 text-gray-700">${statInfo.body}</div>
              <div class="mt-4 rounded-2xl bg-gray-50 px-4 py-3 text-sm font-semibold text-gray-800">${statInfo.formula}</div>
              <div class="mt-5 flex justify-center">
                <button type="button" onclick="closeStatInfo()" class="rounded-full bg-[#b00c15] px-5 py-2 text-sm font-semibold text-white">閉じる</button>
              </div>
            </div>
          </div>
        ` : ''}
      `;
    }

    function createDetailRow(label, value) {
      return `
        <div class="border-b border-gray-100 pb-3.5 last:border-b-0 last:pb-0">
          <div class="text-[10px] font-black tracking-[0.16em] text-gray-400">${label}</div>
          <div class="mt-1.5 text-[14px] font-medium leading-6 text-gray-900">${value}</div>
        </div>
      `;
    }

    function createCompactDetailCell(label, value) {
      return `
        <div class="px-1 py-1">
          <div class="text-[10px] font-black tracking-[0.14em] text-gray-400">${label}</div>
          <div class="mt-1 whitespace-nowrap text-[14px] font-semibold leading-5 text-gray-900">${value}</div>
        </div>
      `;
    }

    function createStatsGrid(title, items) {
      return `
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
          <h3 class="text-sm font-bold text-gray-400 mb-4 tracking-wider">${title}</h3>
          <div class="grid grid-cols-2 gap-3">
            ${items.map(([label, value]) => `
              <div class="rounded-xl bg-gray-50 px-3 py-3">
                <div class="text-xs text-gray-500">${label}</div>
                <div class="mt-1 text-lg font-bold text-gray-900">${value}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    // --- 5. アクション関数 ---
    window.setPositionFilter = (filter) => {
      state.activePositionFilter = filter;
      renderFilters();
      renderPlayerList();
    };

    window.toggleRosterFilter = () => {
      const currentIndex = rosterFilterOrder.indexOf(state.rosterFilter);
      state.rosterFilter = rosterFilterOrder[(currentIndex + 1) % rosterFilterOrder.length];
      renderFilters();
      renderPlayerList();
    };

    window.cycleThrowFilter = () => {
      state.activeThrowFilter =
        state.activeThrowFilter === null ? '右投' :
        state.activeThrowFilter === '右投' ? '左投' :
        null;
      renderFilters();
      renderPlayerList();
    };

    window.cycleBatFilter = () => {
      state.activeBatFilter =
        state.activeBatFilter === null ? '右打' :
        state.activeBatFilter === '右打' ? '左打' :
        null;
      renderFilters();
      renderPlayerList();
    };

    window.cycleSortMode = (event) => {
      event.stopPropagation();
      state.sortMode =
        state.sortMode === 'numberAsc' ? 'ageAsc' :
        state.sortMode === 'ageAsc' ? 'ageDesc' :
        'numberAsc';
      renderPlayerList();
    };

    window.openStatInfo = (metric) => {
      state.activeStatInfo = metric;
      renderDetailModal();
    };

    window.closeStatInfo = () => {
      state.activeStatInfo = null;
      renderDetailModal();
    };

    window.toggleBattingStatsMode = (event) => {
      if (event?.target?.closest('button')) return;
      state.battingStatsMode = state.battingStatsMode === 'slash' ? 'discipline' : 'slash';
      renderDetailModal();
    };

    window.openSettings = () => {
      state.settingsOpen = true;
      state.gameOpen = false;
      state.pendingGameEntry = null;
      state.pendingPositionChange = null;
      state.pendingOutPlayerNo = null;
      state.pendingClearLineup = false;
      renderSearchDock();
      renderSettingsModal();
      renderGameModal();
      updateBodyScroll();
    };

    window.closeSettings = () => {
      state.settingsOpen = false;
      renderSettingsModal();
      renderSearchDock();
      updateBodyScroll();
    };

    window.openGame = () => {
      state.gameOpen = true;
      state.settingsOpen = false;
      state.gameViewIndex = 0;
      state.pendingGameSlot = null;
      state.pendingGameEntry = null;
      state.pendingPositionChange = null;
      state.pendingOutPlayerNo = null;
      renderSearchDock();
      renderSettingsModal();
      renderGameModal();
      updateBodyScroll();
    };

    window.closeGame = () => {
      state.gameOpen = false;
      state.gameViewIndex = 0;
      state.pendingGameSlot = null;
      state.pendingGameEntry = null;
      state.pendingPositionChange = null;
      state.pendingOutPlayerNo = null;
      state.pendingClearLineup = false;
      renderGameModal();
      renderSearchDock();
      updateBodyScroll();
    };

    window.setGameView = (index) => {
      state.gameViewIndex = index;
      state.pendingPositionChange = null;
      state.pendingOutPlayerNo = null;
      state.pendingClearLineup = false;
      renderGameModal();
    };

    window.openBenchFieldersForOrder = (battingOrder) => {
      state.gameViewIndex = 1;
      state.pendingGameSlot = { battingOrder, fieldPosition: null };
      state.pendingPositionChange = null;
      state.pendingOutPlayerNo = null;
      state.pendingClearLineup = false;
      renderGameModal();
    };

    window.openBenchPitchersForSlot = () => {
      state.gameViewIndex = 2;
      state.pendingGameSlot = { battingOrder: 'P', fieldPosition: '投' };
      state.pendingPositionChange = null;
      state.pendingOutPlayerNo = null;
      state.pendingClearLineup = false;
      renderGameModal();
    };

    function getTopScreenIndex() {
      if (state.settingsOpen) return 1;
      if (state.gameOpen) return 2;
      return 0;
    }

    function openTopScreen(index) {
      const normalizedIndex = ((index % 3) + 3) % 3;
      if (normalizedIndex === 0) {
        state.settingsOpen = false;
        state.gameOpen = false;
        state.pendingGameSlot = null;
        state.pendingGameEntry = null;
        state.pendingPositionChange = null;
        state.pendingOutPlayerNo = null;
        state.pendingClearLineup = false;
        renderSettingsModal();
        renderGameModal();
        renderSearchDock();
        updateBodyScroll();
        return;
      }
      if (normalizedIndex === 1) {
        window.openSettings();
        return;
      }
      window.openGame();
    }

    window.cycleTopScreen = () => {
      openTopScreen(getTopScreenIndex() + 1);
    };

    window.showPrevTopScreen = () => {
      openTopScreen(getTopScreenIndex() - 1);
    };

    window.showNextTopScreen = () => {
      openTopScreen(getTopScreenIndex() + 1);
    };

    window.setPlayerRosterStatus = (playerNo, rosterStatus) => {
      const nextAssignments = { ...state.playerAssignments };
      const previous = nextAssignments[playerNo] || { squad: '2軍' };
      nextAssignments[playerNo] = {
        rosterStatus,
        squad: rosterStatus === '支配下'
          ? (['1軍', '2軍', '3軍'].includes(previous.squad) ? previous.squad : '2軍')
          : (previous.squad === '3軍' ? '3軍' : '2軍'),
        bench: false
      };
      state.playerAssignments = nextAssignments;
      savePlayerAssignments();
      renderSettingsModal();
      renderPlayerList();
      renderFilters();
    };

    window.cyclePlayerRosterStatus = (playerNo) => {
      const current = getPlayerAssignment(playerNo);
      window.setPlayerRosterStatus(playerNo, current.rosterStatus === '支配下' ? '育成' : '支配下');
    };

    window.setPlayerSquad = (playerNo, squad) => {
      const current = getPlayerAssignment(playerNo);
      state.playerAssignments = {
        ...state.playerAssignments,
        [playerNo]: {
          ...current,
          squad,
          bench: squad === '1軍' ? current.bench : false
        }
      };
      savePlayerAssignments();
      renderSettingsModal();
    };

    window.cyclePlayerSquad = (playerNo) => {
      const current = getPlayerAssignment(playerNo);
      const order = current.rosterStatus === '支配下' ? ['2軍', '1軍', '3軍'] : ['2軍', '3軍'];
      const nextIndex = (order.indexOf(current.squad) + 1) % order.length;
      window.setPlayerSquad(playerNo, order[nextIndex]);
    };

    window.togglePlayerBench = (playerNo) => {
      const current = getPlayerAssignment(playerNo);
      state.playerAssignments = {
        ...state.playerAssignments,
        [playerNo]: {
          ...current,
          bench: current.squad === '1軍' ? !current.bench : false
        }
      };
      savePlayerAssignments();
      renderSettingsModal();
    };

    window.openGameEntryModal = (playerNo) => {
      const player = playersData.find(item => item.no === playerNo);
      const gameMembers = playersData.filter(item => {
        const assignment = getPlayerAssignment(item.no);
        return assignment.rosterStatus === '支配下' && assignment.squad === '1軍' && assignment.bench;
      });
      const slotPreset = state.pendingGameSlot;
      const defaultPosition = getRecommendedFieldPosition(player, gameMembers);
      const defaultOrder = slotPreset?.battingOrder ?? (
        player.pos === '投手' ? 'P' : getFirstEmptyBattingOrder(gameMembers)
      );
      state.pendingGameEntry = {
        playerNo,
        battingOrder: defaultOrder,
        fieldPosition: slotPreset?.fieldPosition ?? defaultPosition
      };
      state.pendingGameSlot = null;
      renderGameModal();
    };

    window.closeGameEntryModal = () => {
      state.pendingGameSlot = null;
      state.pendingGameEntry = null;
      renderGameModal();
    };

    window.openPositionPicker = (playerNo) => {
      state.pendingPositionChange = { playerNo };
      renderGameModal();
    };

    window.closePositionPicker = () => {
      state.pendingPositionChange = null;
      renderGameModal();
    };

    window.openOutConfirm = (playerNo) => {
      state.pendingOutPlayerNo = playerNo;
      renderGameModal();
    };

    window.closeOutConfirm = () => {
      state.pendingOutPlayerNo = null;
      renderGameModal();
    };

    window.openClearLineupConfirm = () => {
      state.pendingClearLineup = true;
      renderGameModal();
    };

    window.closeClearLineupConfirm = () => {
      state.pendingClearLineup = false;
      renderGameModal();
    };

    window.setPendingGameOrder = (battingOrder) => {
      if (!state.pendingGameEntry) return;
      const normalizedOrder = battingOrder === 'P' ? 'P' : Number(battingOrder);
      state.pendingGameEntry = { ...state.pendingGameEntry, battingOrder: normalizedOrder };
      renderGameModal();
    };

    window.setPendingGamePosition = (fieldPosition) => {
      if (!state.pendingGameEntry) return;
      state.pendingGameEntry = {
        ...state.pendingGameEntry,
        fieldPosition: fieldPosition === 'unset' ? null : fieldPosition
      };
      renderGameModal();
    };

    window.confirmGameEntry = () => {
      if (!state.pendingGameEntry) return;
      const { playerNo, battingOrder, fieldPosition } = state.pendingGameEntry;
      const nextStatuses = { ...state.gameStatuses };
      const hasDh = hasDhLineup(playersData) || fieldPosition === 'DH' || battingOrder === 'P';
      const numericOrder = battingOrder === 'P' ? null : Number(battingOrder);

      const replacedPlayer = playersData.find(item =>
        item.no !== playerNo &&
        getGameEntry(item.no).status === '出場' &&
        getGameEntry(item.no).battingOrder === numericOrder
      );

      if (numericOrder !== null) {
        if (replacedPlayer) {
          nextStatuses[replacedPlayer.no] = {
            ...getGameEntry(replacedPlayer.no),
            status: '退場',
            battingOrder: null
          };
        }
      }

      const currentPitcher = playersData.find(item =>
        item.no !== playerNo &&
        getGameEntry(item.no).status === '出場' &&
        getGameEntry(item.no).fieldPosition === '投' &&
        getGameEntry(item.no).battingOrder === null
      );

      if (fieldPosition === '投' && hasDh && currentPitcher) {
        nextStatuses[currentPitcher.no] = {
          ...getGameEntry(currentPitcher.no),
          status: '退場',
          battingOrder: null
        };
      }

      nextStatuses[playerNo] = {
        status: '出場',
        battingOrder: numericOrder,
        fieldPosition
      };

      state.gameStatuses = nextStatuses;
      state.gameViewIndex = 0;
      state.pendingGameEntry = null;
      saveGameStatuses();
      renderGameModal();
    };

    window.markPlayerOut = (playerNo) => {
      const player = playersData.find(item => item.no === playerNo);
      const currentEntry = getGameEntry(playerNo);
      state.gameStatuses = {
        ...state.gameStatuses,
        [playerNo]: {
          ...currentEntry,
          status: '退場',
          battingOrder: null
        }
      };
      state.pendingGameSlot = {
        battingOrder: currentEntry.battingOrder ?? (currentEntry.fieldPosition === '投' ? 'P' : null),
        fieldPosition: currentEntry.fieldPosition === '投' && currentEntry.battingOrder === null
          ? '投'
          : null
      };
      state.gameViewIndex = player?.pos === '投手' ? 2 : 1;
      state.pendingOutPlayerNo = null;
      saveGameStatuses();
      renderGameModal();
    };

    window.confirmPlayerOut = () => {
      if (!state.pendingOutPlayerNo) return;
      window.markPlayerOut(state.pendingOutPlayerNo);
    };

    window.setGamePosition = (playerNo, fieldPosition) => {
      if (fieldPosition === 'bench') {
        state.pendingPositionChange = null;
        state.pendingOutPlayerNo = playerNo;
        renderGameModal();
        return;
      }
      const entry = getGameEntry(playerNo);
      state.gameStatuses = {
        ...state.gameStatuses,
        [playerNo]: {
          ...entry,
          fieldPosition
        }
      };
      state.pendingPositionChange = null;
      saveGameStatuses();
      renderGameModal();
    };

    window.returnPlayerToBench = (playerNo) => {
      state.gameStatuses = {
        ...state.gameStatuses,
        [playerNo]: {
          ...getGameEntry(playerNo),
          status: '控え',
          battingOrder: null,
          fieldPosition: null
        }
      };
      saveGameStatuses();
      renderGameModal();
    };

    window.confirmClearLineup = () => {
      state.gameStatuses = Object.fromEntries(
        Object.entries(state.gameStatuses).map(([playerNo, entry]) => {
          if (entry?.status === '出場' || entry?.status === '退場') {
            return [playerNo, {
              ...entry,
              status: '控え',
              battingOrder: null,
              fieldPosition: null
            }];
          }
          return [playerNo, entry];
        })
      );
      state.pendingClearLineup = false;
      saveGameStatuses();
      renderGameModal();
    };

    window.toggleSearch = () => {
      state.searchOpen = !state.searchOpen;
      if (!state.searchOpen) {
        state.searchCategory = null;
        state.searchGroup = null;
      }
      renderSearchDock();
      renderSearchStage();
    };

    window.setSearchCategory = (category) => {
      state.searchCategory = category;
      state.searchGroup = null;
      renderSearchDock();
      renderSearchStage();
    };

    window.setSearchGroup = (group) => {
      state.searchGroup = group;
      const resultPlayers = getSearchResultPlayers();
      if (resultPlayers.length === 1) {
        window.openPlayerFromSearch(resultPlayers[0].no);
        return;
      }
      renderSearchDock();
      renderSearchStage();
    };

    window.clearSearchGroup = () => {
      state.searchGroup = null;
      renderSearchDock();
      renderSearchStage();
    };

    window.goBackSearch = () => {
      state.searchCategory = null;
      state.searchGroup = null;
      renderSearchDock();
      renderSearchStage();
    };

    window.selectSearchNumber = (no) => {
      state.searchOpen = false;
      state.searchCategory = null;
      state.searchGroup = null;
      renderSearchDock();
      renderSearchStage();
      window.openDetail(no);
    };

    window.openPlayerFromSearch = (no) => {
      state.searchOpen = false;
      state.searchCategory = null;
      state.searchGroup = null;
      renderSearchDock();
      renderSearchStage();
      window.openDetail(no);
    };

    window.openDetail = (no) => {
      const player = playersData.find(p => p.no === no);
      if (player) {
        state.selectedPlayer = player;
        state.activeStatInfo = null;
        state.battingStatsMode = 'slash';
        renderDetailModal();
        detailModal.classList.remove('hidden');
        renderSearchDock();
        renderSearchStage();
        updateBodyScroll();
      }
    };

    window.closeDetail = () => {
      state.selectedPlayer = null;
      state.activeStatInfo = null;
      state.battingStatsMode = 'slash';
      detailModal.classList.add('hidden');
      detailModal.innerHTML = ''; // メモリ解放
      renderSearchDock();
      renderSearchStage();
      updateBodyScroll();
    };

    let swipeStartX = null;
    let swipeStartY = null;

    document.addEventListener('touchstart', (event) => {
      if (event.touches.length !== 1) return;
      if (state.selectedPlayer || state.searchOpen || state.activeStatInfo || state.pendingGameEntry || state.pendingPositionChange || state.pendingOutPlayerNo || state.pendingClearLineup) return;
      swipeStartX = event.touches[0].clientX;
      swipeStartY = event.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', (event) => {
      if (swipeStartX === null || swipeStartY === null) return;
      if (state.selectedPlayer || state.searchOpen || state.activeStatInfo || state.pendingGameEntry || state.pendingPositionChange || state.pendingOutPlayerNo || state.pendingClearLineup) {
        swipeStartX = null;
        swipeStartY = null;
        return;
      }
      const touch = event.changedTouches?.[0];
      if (!touch) {
        swipeStartX = null;
        swipeStartY = null;
        return;
      }
      const deltaX = touch.clientX - swipeStartX;
      const deltaY = touch.clientY - swipeStartY;
      swipeStartX = null;
      swipeStartY = null;
      if (Math.abs(deltaX) < 56 || Math.abs(deltaX) <= Math.abs(deltaY) * 1.2) return;
      if (deltaX < 0) {
        openTopScreen(getTopScreenIndex() + 1);
        return;
      }
      openTopScreen(getTopScreenIndex() - 1);
    }, { passive: true });

    // --- 6. 初期化 ---
    renderSearchDock();
    renderSearchStage();
    renderFilters();
    renderPlayerList();

  </script>
</body>
</html>
